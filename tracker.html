<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1040" />
  <title>Fortnite Sprites Pocket Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0618;
      --bg-mid: #14102e;
      --surface: rgba(28, 22, 58, 0.72);
      --surface-2: rgba(40, 32, 78, 0.85);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f4f0ff;
      --muted: #a89fd4;
      --accent: #5ee7ff;
      --accent-2: #a855f7;
      --danger: #ff6b8a;
      --radius: 14px;
      --font-display: "Russo One", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(88, 28, 180, 0.45), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 0%, rgba(37, 99, 235, 0.25), transparent 50%),
        radial-gradient(ellipse 70% 60% at 0% 100%, rgba(168, 85, 247, 0.2), transparent 55%),
        linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 45%, #0d0820 100%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.4;
      padding-bottom: env(safe-area-inset-bottom, 12px);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(12, 8, 28, 0.82);
      backdrop-filter: blur(16px) saturate(1.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      padding: 12px 14px 10px;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    header h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(94, 231, 255, 0.35);
      line-height: 1.2;
      max-width: 11rem;
    }

    .progress-wrap { margin-top: 10px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .progress-meta strong {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(94, 231, 255, 0.5);
    }

    .progress-bar {
      height: 10px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #a855f7, #f472b6);
      border-radius: 99px;
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 16px rgba(168, 85, 247, 0.65);
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filters::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border-radius: 99px;
      padding: 7px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .chip.active {
      background: linear-gradient(135deg, rgba(94, 231, 255, 0.25), rgba(168, 85, 247, 0.35));
      border-color: rgba(94, 231, 255, 0.55);
      color: #fff;
      box-shadow: 0 0 18px rgba(94, 231, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .search {
      margin-top: 8px;
      width: 100%;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search:focus {
      outline: none;
      border-color: rgba(94, 231, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(94, 231, 255, 0.12);
    }

    main { padding: 14px 10px 24px; max-width: 720px; margin: 0 auto; }

    .loading, .error-box {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .error-box { color: var(--danger); }

    .character-section { margin-bottom: 22px; }

    .character-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 4px 0 10px;
      border-left: 3px solid var(--accent-2);
    }

    .character-header h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .character-stats {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .character-stats.done {
      color: #fff;
      border-color: rgba(94, 231, 255, 0.4);
      background: rgba(94, 231, 255, 0.12);
      box-shadow: 0 0 12px rgba(94, 231, 255, 0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    }

    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(5, 1fr); }
      header h1 { max-width: none; font-size: 0.95rem; }
    }

    .sprite-card {
      --mat-accent: #94a3b8;
      --mat-glow: rgba(148, 163, 184, 0.35);
      --mat-fill: rgba(148, 163, 184, 0.12);
      --mat-gradient: linear-gradient(145deg, rgba(148, 163, 184, 0.1), rgba(30, 41, 59, 0.2));
      --mat-fill-strength: 40%;
      position: relative;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.25));
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 6px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      touch-action: manipulation;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .sprite-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--mat-gradient);
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .sprite-card:active:not(.readonly) { transform: scale(0.96); }

    .sprite-card.collected {
      --mat-fill-strength: 100%;
      border-color: var(--mat-accent);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--mat-accent) 60%, transparent),
        0 0 22px var(--mat-glow),
        0 10px 24px rgba(0, 0, 0, 0.45);
    }

    .sprite-card.collected::before { opacity: 0.85; }

    .sprite-card.collected::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      border: 1px solid color-mix(in srgb, var(--mat-accent) 45%, transparent);
      box-shadow: inset 0 0 20px color-mix(in srgb, var(--mat-glow) 50%, transparent);
      pointer-events: none;
    }

    .sprite-card[data-material="holofoil"].collected::before {
      animation: holo-shimmer 2.8s linear infinite;
    }

    @keyframes holo-shimmer {
      0% { filter: hue-rotate(0deg); opacity: 0.75; }
      50% { filter: hue-rotate(35deg); opacity: 1; }
      100% { filter: hue-rotate(0deg); opacity: 0.75; }
    }

    .check-badge {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 800;
      color: transparent;
      z-index: 3;
      transition: all 0.2s ease;
    }

    .sprite-card.collected .check-badge {
      background: var(--mat-accent);
      border-color: #fff;
      color: #0a0618;
      box-shadow: 0 0 12px var(--mat-glow);
    }

    .sprite-img-wrap {
      position: relative;
      z-index: 1;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, color-mix(in srgb, var(--mat-fill) var(--mat-fill-strength), transparent) 0%, rgba(8, 6, 20, 0.92) 68%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    .sprite-card.collected .sprite-img-wrap {
      background:
        radial-gradient(circle at 50% 25%, color-mix(in srgb, var(--mat-fill) 180%, white) 0%, color-mix(in srgb, var(--mat-fill) 80%, transparent) 42%, rgba(6, 4, 18, 0.88) 72%);
      box-shadow:
        inset 0 0 28px color-mix(in srgb, var(--mat-glow) 55%, transparent),
        0 0 14px color-mix(in srgb, var(--mat-glow) 40%, transparent);
    }

    .sprite-img {
      width: 88%;
      height: 88%;
      object-fit: contain;
      transition: transform 0.2s ease, filter 0.2s ease;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.45));
    }

    .sprite-card.collected .sprite-img {
      transform: scale(1.04);
      filter: drop-shadow(0 0 10px var(--mat-glow)) drop-shadow(0 4px 10px rgba(0, 0, 0, 0.35));
    }

    .sprite-card:not(.collected) .sprite-img {
      opacity: 0.92;
    }

    .sprite-label {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      text-align: center;
    }

    .sprite-label strong {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 2px 7px;
      border-radius: 99px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.2s ease;
    }

    .sprite-card.collected .sprite-label strong {
      color: #fff;
      background: color-mix(in srgb, var(--mat-accent) 35%, rgba(0, 0, 0, 0.4));
      border-color: color-mix(in srgb, var(--mat-accent) 50%, transparent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--mat-glow) 35%, transparent);
    }

    .hidden { display: none !important; }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .btn-share {
      border: 1px solid rgba(94, 231, 255, 0.35);
      background: rgba(94, 231, 255, 0.1);
      color: #dffaff;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(94, 231, 255, 0.15);
    }

    .btn-share:active { transform: scale(0.97); }

    .lang-switch {
      display: flex;
      gap: 4px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 2px;
    }

    .lang-switch button {
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-switch button.active {
      background: linear-gradient(135deg, #5ee7ff, #a855f7);
      color: #0a0618;
    }

    .shared-banner {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #e9d5ff;
      text-align: center;
      box-shadow: 0 0 16px rgba(168, 85, 247, 0.15);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(28, 22, 58, 0.95);
      border: 1px solid rgba(94, 231, 255, 0.35);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.85rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(94, 231, 255, 0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .toast.visible { opacity: 1; }

    .save-prompt-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(5, 3, 15, 0.72);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .save-prompt {
      background: linear-gradient(160deg, rgba(40, 32, 78, 0.95), rgba(20, 14, 42, 0.98));
      border: 1px solid rgba(168, 85, 247, 0.45);
      border-radius: 16px;
      padding: 20px 16px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.25);
    }

    .save-prompt p {
      margin: 0 0 14px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .save-prompt button.primary {
      width: 100%;
      background: linear-gradient(135deg, #22d3ee, #a855f7);
      color: #0a0618;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
    }

    .save-prompt button.primary:active { transform: scale(0.98); }

    .sprite-card.readonly { cursor: default; }
  </style>
  <script src="i18n.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <h1 id="title">Fortnite Sprites Pocket Tracker</h1>
      <div class="header-actions">
        <button type="button" id="btn-share" class="btn-share" data-i18n="share" hidden>Share</button>
        <div id="lang-slot"></div>
      </div>
    </div>
    <div class="shared-banner hidden" id="shared-banner" hidden></div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span><span id="progress-label">Collected</span>: <strong id="progress-text">0 / 0</strong></span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="filters" id="filters">
      <button type="button" class="chip active" data-filter="all" data-i18n="filterAll">All</button>
      <button type="button" class="chip" data-filter="missing" data-i18n="filterMissing">Missing</button>
      <button type="button" class="chip" data-filter="collected" data-i18n="filterCollected">Collected</button>
    </div>
    <input class="search" type="search" id="search" data-i18n-placeholder="searchPlaceholder" placeholder="Search sprite or variant…" autocomplete="off" />
  </header>

  <main id="app">
    <div class="loading" id="loading" data-i18n="loading">Loading</div>
  </main>

  <div class="save-prompt-overlay hidden" id="save-prompt" hidden>
    <div class="save-prompt">
      <p id="save-prompt-text" data-i18n="saveAndEdit">Save to memory and edit</p>
      <button type="button" class="primary" id="btn-adopt" data-i18n="saveAndEdit">Save to memory and edit</button>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    const CONFIG_URL = "sprites-config.json";
    const HD_MAP_URL = "sprites-hd-map.json";
    const STORAGE_KEY = "klombo-tracker-collected-v1";
    const SHARE_PARAM = "s";

    let config = null;
    let hdMap = null;
    let catalog = [];
    let collected = new Set();
    let filter = "all";
    let searchQuery = "";
    let readOnly = false;

    const $app = document.getElementById("app");
    const $title = document.getElementById("title");
    const $progressLabel = document.getElementById("progress-label");
    const $progressText = document.getElementById("progress-text");
    const $progressPct = document.getElementById("progress-pct");
    const $progressFill = document.getElementById("progress-fill");
    const $search = document.getElementById("search");
    const $btnShare = document.getElementById("btn-share");
    const $sharedBanner = document.getElementById("shared-banner");
    const $savePrompt = document.getElementById("save-prompt");
    const $toast = document.getElementById("toast");

    let toastTimer = null;

    const MATERIAL_THEME = {
      base: {
        accent: "#b8c2d4",
        glow: "rgba(184, 194, 212, 0.55)",
        fill: "rgba(148, 163, 184, 0.22)",
        gradient: "linear-gradient(145deg, rgba(148,163,184,0.28), rgba(51,65,85,0.12))",
      },
      gold: {
        accent: "#fbbf24",
        glow: "rgba(251, 191, 36, 0.7)",
        fill: "rgba(251, 191, 36, 0.32)",
        gradient: "linear-gradient(145deg, rgba(251,191,36,0.42), rgba(245,158,11,0.15))",
      },
      gummy: {
        accent: "#f472b6",
        glow: "rgba(244, 114, 182, 0.65)",
        fill: "rgba(244, 114, 182, 0.3)",
        gradient: "linear-gradient(145deg, rgba(244,114,182,0.4), rgba(219,39,119,0.12))",
      },
      galaxy: {
        accent: "#818cf8",
        glow: "rgba(129, 140, 248, 0.7)",
        fill: "rgba(129, 140, 248, 0.32)",
        gradient: "linear-gradient(145deg, rgba(129,140,248,0.42), rgba(79,70,229,0.15))",
      },
      holofoil: {
        accent: "#22d3ee",
        glow: "rgba(34, 211, 238, 0.75)",
        fill: "rgba(34, 211, 238, 0.28)",
        gradient: "linear-gradient(145deg, rgba(34,211,238,0.38), rgba(6,182,212,0.12))",
      },
      gem: {
        accent: "#c084fc",
        glow: "rgba(192, 132, 252, 0.7)",
        fill: "rgba(192, 132, 252, 0.3)",
        gradient: "linear-gradient(145deg, rgba(192,132,252,0.4), rgba(147,51,234,0.14))",
      },
    };

    function applyMaterialTheme(card, materialId) {
      const theme = MATERIAL_THEME[materialId] || MATERIAL_THEME.base;
      card.dataset.material = materialId;
      card.style.setProperty("--mat-accent", theme.accent);
      card.style.setProperty("--mat-glow", theme.glow);
      card.style.setProperty("--mat-fill", theme.fill);
      card.style.setProperty("--mat-gradient", theme.gradient);
    }

    function applyStaticI18n() {
      document.title = SpritedexI18n.t("appTitle");
      $title.textContent = SpritedexI18n.t("trackerTitle");
      $progressLabel.textContent = SpritedexI18n.t("collected");
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        el.textContent = SpritedexI18n.t(el.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        el.placeholder = SpritedexI18n.t(el.dataset.i18nPlaceholder);
      });
      updateSharedBanner();
    }

    function showToast(message) {
      $toast.textContent = message;
      $toast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => $toast.classList.remove("visible"), 2200);
    }

    function updateSharedBanner() {
      if (!readOnly) {
        $sharedBanner.hidden = true;
        $sharedBanner.classList.add("hidden");
        return;
      }
      $sharedBanner.textContent = SpritedexI18n.t("sharedViewBanner");
      $sharedBanner.hidden = false;
      $sharedBanner.classList.remove("hidden");
    }

    function showSavePrompt() {
      $savePrompt.hidden = false;
      $savePrompt.classList.remove("hidden");
    }

    function hideSavePrompt() {
      $savePrompt.hidden = true;
      $savePrompt.classList.add("hidden");
    }

    function toBase64Url(bytes) {
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function fromBase64Url(str) {
      const padded = str.replace(/-/g, "+").replace(/_/g, "/");
      const pad = padded.length % 4 ? "=".repeat(4 - (padded.length % 4)) : "";
      const binary = atob(padded + pad);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function encodeShareBitmap(items, set) {
      const n = items.length;
      const header = new Uint8Array(2);
      header[0] = (n >> 8) & 0xff;
      header[1] = n & 0xff;
      const bitmap = new Uint8Array(Math.ceil(n / 8));
      items.forEach((item, i) => {
        if (set.has(item.id)) bitmap[Math.floor(i / 8)] |= 1 << (i % 8);
      });
      const packed = new Uint8Array(header.length + bitmap.length);
      packed.set(header);
      packed.set(bitmap, header.length);
      return toBase64Url(packed);
    }

    function decodeShareBitmap(items, encoded) {
      const packed = fromBase64Url(encoded);
      if (packed.length < 2) return null;
      const count = (packed[0] << 8) | packed[1];
      if (count !== items.length) return null;
      const bitmap = packed.subarray(2);
      const needed = Math.ceil(count / 8);
      if (bitmap.length < needed) return null;
      const set = new Set();
      items.forEach((item, i) => {
        if (bitmap[Math.floor(i / 8)] & (1 << (i % 8))) set.add(item.id);
      });
      return set;
    }

    function buildShareUrl() {
      const token = encodeShareBitmap(catalog, collected);
      const url = new URL(location.href);
      url.search = "";
      url.searchParams.set(SHARE_PARAM, token);
      return url.toString();
    }

    function parseShareFromUrl(items) {
      const token = new URLSearchParams(location.search).get(SHARE_PARAM);
      if (!token) return null;
      return decodeShareBitmap(items, token);
    }

    function clearShareFromUrl() {
      const url = new URL(location.href);
      if (!url.searchParams.has(SHARE_PARAM)) return;
      url.searchParams.delete(SHARE_PARAM);
      history.replaceState(null, "", url.pathname + url.hash);
    }

    async function shareCollection() {
      if (!catalog.length) return;
      try {
        const shareUrl = buildShareUrl();
        if (navigator.share) {
          try {
            await navigator.share({
              title: SpritedexI18n.t("appTitle"),
              url: shareUrl,
            });
            return;
          } catch (err) {
            if (err?.name === "AbortError") return;
          }
        }
        await navigator.clipboard.writeText(shareUrl);
        showToast(SpritedexI18n.t("shareCopied"));
      } catch (_) {
        showToast(SpritedexI18n.t("shareError"));
      }
    }

    function adoptSharedCollection() {
      readOnly = false;
      saveCollected();
      clearShareFromUrl();
      hideSavePrompt();
      updateSharedBanner();
      render();
    }

    function loadCollected() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return new Set();
        const arr = JSON.parse(raw);
        return new Set(Array.isArray(arr) ? arr : []);
      } catch (_) {
        return new Set();
      }
    }

    function saveCollected() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...collected]));
    }

    function namedImagePath(item) {
      if (item.output) {
        const out = item.output.replace(/^sprites_named\//, "");
        return `sprites_named/${out}`;
      }
      if (item.filename) return `sprites_named/${item.filename}`;
      return null;
    }

    function imagePath(item) {
      if (item.hdImage) return item.hdImage;
      return namedImagePath(item) || `sprites/${item.source?.replace(/^sprites\//, "") || item.id}.png`;
    }

    function resolveHdImage(item) {
      if (!hdMap) return null;
      return hdMap.byId?.[item.id]
        ?? hdMap.byKey?.[`${item.spriteId}:${item.materialId}`]
        ?? null;
    }

    function buildCatalog(cfg) {
      if (Array.isArray(cfg.catalog) && cfg.catalog.length) {
        return cfg.catalog.map((item) => {
          const entry = {
            id: item.id,
            spriteId: item.spriteId || item.character,
            materialId: item.materialId || item.material || cfg.defaultMaterial || "base",
            filename: item.filename,
            output: item.output,
            source: item.source,
            fallbackImage: namedImagePath(item),
          };
          entry.hdImage = resolveHdImage(entry);
          entry.image = entry.hdImage || entry.fallbackImage;
          return entry;
        });
      }

      const items = [];
      for (const group of cfg.groups || []) {
        const spriteId = group.spriteId || group.name;
        for (const sprite of group.sprites || []) {
          const materialId = sprite.materialId
            || cfg.materialAliases?.[sprite.type || sprite.material || ""]
            || sprite.material
            || sprite.type
            || cfg.defaultMaterial
            || "base";
          const fallback = sprite.output
            ? `sprites_named/${sprite.output}`
            : namedImagePath(sprite);
          const entry = {
            id: sprite.id || sprite.source?.replace(/\.png$/i, ""),
            spriteId,
            materialId,
            filename: sprite.output,
            fallbackImage: fallback,
          };
          entry.hdImage = resolveHdImage(entry);
          entry.image = entry.hdImage || entry.fallbackImage;
          items.push(entry);
        }
      }
      return items;
    }

    function displaySprite(item) {
      return SpritedexI18n.spriteName(item.spriteId);
    }

    function displayMaterial(item) {
      return SpritedexI18n.materialName(item.materialId);
    }

    function groupCatalog(items) {
      const map = new Map();
      for (const item of items) {
        const key = item.spriteId;
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      }
      const locale = SpritedexI18n.getLocale() === "ru" ? "ru" : "en";
      return [...map.entries()].sort((a, b) =>
        displaySprite({ spriteId: a[0] }).localeCompare(displaySprite({ spriteId: b[0] }), locale)
      );
    }

    function matchesSearch(item) {
      if (!searchQuery) return true;
      const q = searchQuery.toLocaleLowerCase();
      return (
        displaySprite(item).toLocaleLowerCase().includes(q) ||
        displayMaterial(item).toLocaleLowerCase().includes(q)
      );
    }

    function matchesFilter(item) {
      const isCollected = collected.has(item.id);
      if (filter === "collected") return isCollected;
      if (filter === "missing") return !isCollected;
      return true;
    }

    function updateProgress() {
      const total = catalog.length;
      const done = catalog.filter((s) => collected.has(s.id)).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      $progressText.textContent = `${done} / ${total}`;
      $progressPct.textContent = `${pct}%`;
      $progressFill.style.width = `${pct}%`;
    }

    function toggleSprite(id) {
      if (readOnly) {
        showSavePrompt();
        return;
      }
      if (collected.has(id)) collected.delete(id);
      else collected.add(id);
      saveCollected();
      updateProgress();
      render();
    }

    function renderCard(item) {
      const isCollected = collected.has(item.id);
      const spriteLabel = displaySprite(item);
      const materialLabel = displayMaterial(item);
      const card = document.createElement("button");
      card.type = "button";
      card.className = `sprite-card${isCollected ? " collected" : ""}${readOnly ? " readonly" : ""}`;
      applyMaterialTheme(card, item.materialId);
      card.setAttribute("aria-pressed", isCollected ? "true" : "false");
      card.setAttribute(
        "aria-label",
        `${spriteLabel}, ${materialLabel}${isCollected ? `, ${SpritedexI18n.t("collectedAria")}` : ""}`
      );

      card.innerHTML = `
        <span class="check-badge" aria-hidden="true">✓</span>
        <div class="sprite-img-wrap">
          <img class="sprite-img" src="${item.image}" alt="" loading="lazy" decoding="async" />
        </div>
        <div class="sprite-label">
          <strong>${materialLabel}</strong>
        </div>
      `;

      card.querySelector("img").addEventListener("error", function onErr() {
        this.removeEventListener("error", onErr);
        const src = this.src;
        if (item.fallbackImage && src !== item.fallbackImage) {
          this.src = item.fallbackImage;
          return;
        }
        if (src.includes("sprites_named/")) {
          this.src = src.replace("sprites_named/", "sprites/");
        }
      });

      card.addEventListener("click", () => toggleSprite(item.id));
      return card;
    }

    function render() {
      const grouped = groupCatalog(catalog);
      const frag = document.createDocumentFragment();
      let visibleCount = 0;

      for (const [spriteId, sprites] of grouped) {
        const visible = sprites.filter((s) => matchesSearch(s) && matchesFilter(s));
        if (!visible.length) continue;
        visibleCount += visible.length;

        const section = document.createElement("section");
        section.className = "character-section";

        const doneInGroup = sprites.filter((s) => collected.has(s.id)).length;
        const header = document.createElement("div");
        header.className = "character-header";
        header.innerHTML = `
          <h2>${displaySprite({ spriteId })}</h2>
          <span class="character-stats${doneInGroup === sprites.length ? " done" : ""}">${doneInGroup}/${sprites.length}</span>
        `;

        const grid = document.createElement("div");
        grid.className = "grid";
        for (const item of visible) {
          grid.appendChild(renderCard(item));
        }

        section.append(header, grid);
        frag.appendChild(section);
      }

      $app.innerHTML = "";
      if (!visibleCount) {
        $app.innerHTML = `<div class="empty-state">${SpritedexI18n.t("noResults")}</div>`;
      } else {
        $app.appendChild(frag);
      }

      updateProgress();
    }

    async function init() {
      try {
        const [configRes, hdRes] = await Promise.all([
          fetch(CONFIG_URL, { cache: "no-store" }),
          fetch(HD_MAP_URL, { cache: "no-store" }).catch(() => null),
        ]);
        if (!configRes.ok) throw new Error(SpritedexI18n.t("loadError"));
        config = await configRes.json();
        if (hdRes?.ok) hdMap = await hdRes.json();
        SpritedexI18n.init(config);
        SpritedexI18n.createLanguageSwitcher(document.getElementById("lang-slot"));
        applyStaticI18n();
        catalog = buildCatalog(config);
        const shared = parseShareFromUrl(catalog);
        if (shared) {
          collected = shared;
          readOnly = true;
        } else {
          collected = loadCollected();
          readOnly = false;
        }
        $btnShare.hidden = false;
        updateSharedBanner();
        render();
      } catch (err) {
        $app.innerHTML = `<div class="error-box">${err.message}</div>`;
      }
    }

    document.getElementById("filters").addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      filter = chip.dataset.filter;
      document.querySelectorAll(".chip").forEach((c) => c.classList.toggle("active", c === chip));
      render();
    });

    $search.addEventListener("input", (e) => {
      searchQuery = e.target.value.trim();
      render();
    });

    $btnShare.addEventListener("click", () => shareCollection());
    document.getElementById("btn-adopt").addEventListener("click", () => adoptSharedCollection());
    $savePrompt.addEventListener("click", (e) => {
      if (e.target === $savePrompt) hideSavePrompt();
    });

    window.addEventListener("spritedex:localechange", () => {
      applyStaticI18n();
      render();
    });

    init();
  </script>
</body>
</html>
