<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spritedex" />
  <meta name="application-name" content="Spritedex" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0618" />
  <title>Fortnite Sprites Pocket Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0618;
      --bg-mid: #14102e;
      --surface: rgba(28, 22, 58, 0.72);
      --surface-2: rgba(40, 32, 78, 0.85);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f4f0ff;
      --muted: #a89fd4;
      --accent: #5ee7ff;
      --accent-2: #a855f7;
      --danger: #ff6b8a;
      --radius: 14px;
      --font-display: "Russo One", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html {
      background-color: var(--bg-deep);
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(88, 28, 180, 0.45), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 0%, rgba(37, 99, 235, 0.25), transparent 50%),
        radial-gradient(ellipse 70% 60% at 0% 100%, rgba(168, 85, 247, 0.2), transparent 55%),
        linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 45%, #0d0820 100%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.4;
      padding-bottom: env(safe-area-inset-bottom, 12px);
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(12, 8, 28, 0.82);
      backdrop-filter: blur(16px) saturate(1.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      padding: 12px 14px 10px;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    header h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(94, 231, 255, 0.35);
      line-height: 1.2;
      max-width: none;
      flex: 1;
      min-width: 0;
    }

    .progress-wrap { margin-top: 10px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .progress-meta strong {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(94, 231, 255, 0.5);
    }

    .progress-breakdown {
      display: none;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 6px;
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    @media (min-width: 720px) {
      .progress-breakdown { display: flex; }
    }

    .filter-bar {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      --filter-pad-h: calc((100vw - 16px - 24px) / 9);
    }

    .filters-material { margin-top: 0; }

    .filters-material {
      display: grid;
      grid-template-columns: repeat(var(--mat-count, 9), minmax(0, 1fr));
      gap: 3px;
      overflow: visible;
    }

    .mat-pad {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      height: var(--filter-pad-h);
      max-height: 34px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.52rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      background: var(--mat-gradient, rgba(255, 255, 255, 0.08));
    }

    .mat-pad:active { transform: scale(0.94); }

    .mat-pad.active {
      border-color: #fff;
      box-shadow: 0 0 10px var(--mat-glow, rgba(94, 231, 255, 0.45));
      transform: scale(1.04);
    }

    .mat-pad-all {
      background: linear-gradient(
        135deg,
        #94a3b8 0%,
        #fbbf24 16%,
        #f472b6 32%,
        #818cf8 48%,
        #22d3ee 64%,
        #c084fc 80%,
        #38bdf8 100%
      );
    }

    .mat-pad-all.active {
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.55);
    }

    .filters-status { margin-top: 0; }

    .filters-rarity {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 3px;
      margin-top: 0;
      overflow: visible;
    }

    .rarity-pad {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      height: var(--filter-pad-h);
      max-height: 34px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      background: rgba(255, 255, 255, 0.08);
    }

    .rarity-pad:active { transform: scale(0.94); }

    .rarity-pad.active {
      border-color: #fff;
      box-shadow: 0 0 10px var(--rarity-glow, rgba(168, 85, 247, 0.45));
      transform: scale(1.04);
    }

    .rarity-pad-all {
      background: linear-gradient(135deg, #60a5fa 0%, #c084fc 33%, #fbbf24 66%, #f472b6 100%);
      --rarity-glow: rgba(168, 85, 247, 0.55);
    }

    .rarity-pad[data-rarity-filter="rare"] {
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.75), rgba(37, 99, 235, 0.4));
      --rarity-glow: rgba(96, 165, 250, 0.6);
    }

    .rarity-pad[data-rarity-filter="epic"] {
      background: linear-gradient(135deg, rgba(192, 132, 252, 0.75), rgba(126, 34, 206, 0.4));
      --rarity-glow: rgba(192, 132, 252, 0.6);
    }

    .rarity-pad[data-rarity-filter="legendary"] {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.8), rgba(217, 119, 6, 0.45));
      --rarity-glow: rgba(251, 191, 36, 0.65);
      color: #1a1040;
      text-shadow: none;
    }

    .rarity-pad[data-rarity-filter="mythic"] {
      background: linear-gradient(135deg, rgba(244, 114, 182, 0.8), rgba(219, 39, 119, 0.45));
      --rarity-glow: rgba(244, 114, 182, 0.65);
    }

    .chip-label-short { display: none; }

    .progress-breakdown span strong {
      color: #e9d5ff;
      font-weight: 800;
    }

    .chip[data-rarity="rare"].active {
      border-color: rgba(96, 165, 250, 0.7);
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.3), rgba(37, 99, 235, 0.2));
    }

    .chip[data-rarity="epic"].active {
      border-color: rgba(192, 132, 252, 0.7);
      background: linear-gradient(135deg, rgba(192, 132, 252, 0.3), rgba(126, 34, 206, 0.2));
    }

    .chip[data-rarity="legendary"].active {
      border-color: rgba(251, 191, 36, 0.7);
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.3), rgba(217, 119, 6, 0.2));
    }

    .chip[data-rarity="mythic"].active {
      border-color: rgba(244, 114, 182, 0.7);
      background: linear-gradient(135deg, rgba(244, 114, 182, 0.3), rgba(219, 39, 119, 0.2));
    }

    .rarest-panel {
      margin-bottom: 12px;
      padding: 6px 8px;
      border-radius: 10px;
      background: rgba(28, 22, 58, 0.55);
      border: 1px solid rgba(168, 85, 247, 0.25);
      box-shadow: 0 0 24px rgba(168, 85, 247, 0.08);
    }

    .rarest-panel h2 {
      margin: 0 0 4px;
      font-family: var(--font-display);
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .rarest-done {
      margin: 0;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
    }

    .rarest-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }

    .rarest-scroll::-webkit-scrollbar { display: none; }

    .rarest-card {
      flex: 0 0 46px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s, border-color 0.15s;
    }

    .rarest-card:active { transform: scale(0.96); }

    .rarest-card:hover {
      border-color: rgba(94, 231, 255, 0.45);
    }

    .rarest-card img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
      margin: 0 auto 1px;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
    }

    .rarest-card strong {
      display: block;
      font-size: 0.46rem;
      line-height: 1.1;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rarest-card span {
      display: block;
      font-size: 0.42rem;
      line-height: 1.05;
      color: var(--muted);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-bar {
      height: 10px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #a855f7, #f472b6);
      border-radius: 99px;
      transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 16px rgba(168, 85, 247, 0.65);
    }

    .filters {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filter-bar > .filters { margin-top: 0; }

    .filters::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      border-radius: 99px;
      padding: 7px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .chip.active {
      background: linear-gradient(135deg, rgba(94, 231, 255, 0.25), rgba(168, 85, 247, 0.35));
      border-color: rgba(94, 231, 255, 0.55);
      color: #fff;
      box-shadow: 0 0 18px rgba(94, 231, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .search {
      margin-top: 8px;
      width: 100%;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search:focus {
      outline: none;
      border-color: rgba(94, 231, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(94, 231, 255, 0.12);
    }

    main {
      padding: 14px 80px 24px 10px;
      max-width: 720px;
      margin: 0 auto;
    }

    .sprite-rail {
      position: fixed;
      right: 4px;
      top: calc(env(safe-area-inset-top, 0px) + var(--header-offset, 200px) + 6px);
      transform: none;
      z-index: 19;
      display: grid;
      grid-template-columns: repeat(2, 32px);
      grid-auto-flow: row;
      gap: 3px;
      width: 67px;
      max-height: calc(
        100dvh - env(safe-area-inset-top, 0px) - var(--header-offset, 200px) - env(safe-area-inset-bottom, 0px) - 18px
      );
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 2px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .sprite-rail::-webkit-scrollbar { display: none; }

    .sprite-rail.hidden { display: none; }

    .sprite-rail-btn {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(12, 8, 28, 0.88);
      padding: 3px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, opacity 0.15s;
    }

    .sprite-rail-btn:active { transform: scale(0.94); }

    .sprite-rail-btn:hover,
    .sprite-rail-btn:focus-visible {
      border-color: rgba(94, 231, 255, 0.55);
      outline: none;
    }

    .sprite-rail-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.45));
    }

    .sprite-rail-btn.dimmed { opacity: 0.38; }

    .sprite-rail-btn.active {
      border-color: rgba(94, 231, 255, 0.75);
      box-shadow: 0 0 12px rgba(94, 231, 255, 0.25);
    }

    @media (min-width: 720px) {
      main { padding: 14px 10px 24px; }
      .sprite-rail { display: none; }
    }

    .btn-label-short,
    .chip-label-short { display: none; }

    @media (max-width: 719px) {
      header {
        padding: 6px 8px 6px;
        padding-top: max(6px, env(safe-area-inset-top));
      }

      header h1 { font-size: 0.65rem; letter-spacing: 0.03em; }

      .header-head { gap: 4px; }

      .header-toolbar { gap: 4px; }

      .header-toolbar button {
        flex: 1;
        min-width: 0;
        padding: 4px 3px;
        font-size: 0.58rem;
      }

      .btn-guide { flex: 0 0 28px !important; }

      .btn-label-long { display: none; }
      .btn-label-short { display: inline; }

      .progress-wrap { margin-top: 4px; }

      .progress-meta {
        margin-bottom: 3px;
        font-size: 0.65rem;
      }

      .progress-bar { height: 6px; }

      .filter-bar {
        margin-top: 4px;
        gap: 8px;
      }

      .filters-status {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 3px;
        overflow: visible;
      }

      .filters-status .chip {
        padding: 4px 2px;
        font-size: 0.58rem;
        text-align: center;
        border-radius: 7px;
        letter-spacing: 0.02em;
      }

      .chip-label-long { display: none; }
      .chip-label-short { display: inline; }

      .search {
        margin-top: 4px;
        padding: 6px 8px;
        font-size: 14px;
        border-radius: 8px;
      }
    }

    .loading, .error-box {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .error-box { color: var(--danger); }

    .character-section {
      margin-bottom: 22px;
      scroll-margin-top: calc(var(--header-offset, 200px) + 8px);
    }

    .character-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 4px 0 10px;
      border-left: 3px solid var(--accent-2);
    }

    .character-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .character-header h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .character-ability {
      margin: 5px 0 0;
      font-size: 0.72rem;
      line-height: 1.4;
      color: var(--muted);
      font-weight: 500;
    }

    .character-stats {
      flex: 0 0 auto;
      margin-top: 2px;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .character-stats.done {
      color: #fff;
      border-color: rgba(94, 231, 255, 0.4);
      background: rgba(94, 231, 255, 0.12);
      box-shadow: 0 0 12px rgba(94, 231, 255, 0.2);
    }

    .character-header-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex: 0 0 auto;
    }

    .character-stats.mastery-stats {
      font-size: 0.66rem;
      color: #fde68a;
      border-color: rgba(251, 191, 36, 0.25);
      background: rgba(251, 191, 36, 0.08);
    }

    .character-stats.mastery-stats.done {
      color: #fff;
      border-color: rgba(251, 191, 36, 0.55);
      background: rgba(251, 191, 36, 0.18);
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.25);
    }

    .mastery-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      z-index: 4;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.72rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .mastery-badge.active {
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.65);
      background: rgba(251, 191, 36, 0.15);
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.45);
      text-shadow: 0 0 6px rgba(251, 191, 36, 0.8);
    }

    .mastery-badge.locked {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .mastery-badge:active { transform: scale(0.92); }

    .detail-actions .btn-mastery:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .sprite-card.mastered {
      box-shadow:
        0 0 0 1px rgba(251, 191, 36, 0.35),
        0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .sprite-card.mastered.collected {
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--mat-accent) 60%, transparent),
        0 0 0 2px rgba(251, 191, 36, 0.45),
        0 0 22px var(--mat-glow),
        0 10px 24px rgba(0, 0, 0, 0.45);
    }

    .character-section.all-mastered .character-header {
      border-left-color: #fbbf24;
    }

    .detail-actions .btn-mastery {
      background: rgba(251, 191, 36, 0.15);
      color: #fde68a;
      border: 1px solid rgba(251, 191, 36, 0.45);
    }

    .detail-actions .btn-mastery.active {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1a1040;
      border: none;
      box-shadow: 0 0 18px rgba(251, 191, 36, 0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    }

    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(5, 1fr); }
      header h1 { max-width: none; font-size: 0.95rem; }
      .header-head {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .header-toolbar { flex-wrap: nowrap; }
    }

    .sprite-card {
      --mat-accent: #94a3b8;
      --mat-glow: rgba(148, 163, 184, 0.35);
      --mat-fill: rgba(148, 163, 184, 0.12);
      --mat-gradient: linear-gradient(145deg, rgba(148, 163, 184, 0.1), rgba(30, 41, 59, 0.2));
      --mat-fill-strength: 40%;
      position: relative;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.25));
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 6px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      touch-action: manipulation;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .sprite-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--mat-gradient);
      opacity: 0.35;

    .detail-actions button:active { transform: scale(0.98); }
  </style>
  <script src="i18n.js?v13"></script>
</head>
<body>
  <header>
    <div class="header-head">
      <div class="header-top">
        <h1 id="title">Fortnite Sprites Pocket Tracker</h1>
        <div id="lang-slot"></div>
      </div>
      <div class="header-toolbar">
        <button type="button" id="btn-share" class="btn-share" hidden>

        <button type="button" id="btn-compare" class="btn-compare" hidden>
          <span class="btn-label-long" data-i18n="compare">Compare</span>

        <button type="button" id="btn-guide" class="btn-guide" aria-label="Guide" title="Guide" hidden>?</button>

    <div class="shared-banner hidden" id="shared-banner" hidden></div>
    <div class="compare-banner hidden" id="compare-banner" hidden>

        <strong id="compare-banner-title"></strong>
        <button type="button" id="btn-compare-exit" data-i18n="compareClose">Exit compare</button>
      </div>
      <div class="compare-stats" id="compare-stats"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span><span id="progress-label">Collected</span>: <strong id="progress-text">0 / 0</strong></span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-breakdown" id="progress-breakdown"></div>
    </div>
    <div class="filter-bar" id="filter-bar">
      <div class="filters filters-status" id="filters">
        <button type="button" class="chip active" data-filter="all">
          <span class="chip-label-long" data-i18n="filterAll">All</span>
          <span class="chip-label-short" data-i18n="filterAllShort">All</span>
        </button>
        <button type="button" class="chip" data-filter="missing">
          <span class="chip-label-long" data-i18n="filterMissing">Missing</span>
          <span class="chip-label-short" data-i18n="filterMissingShort">Miss</span>
        </button>
        <button type="button" class="chip" data-filter="collected">
          <span class="chip-label-long" data-i18n="filterCollected">Collected</span>
          <span class="chip-label-short" data-i18n="filterCollectedShort">Got</span>
        </button>
        <button type="button" class="chip" data-filter="mastered">
          <span class="chip-label-long" data-i18n="filterMastered">Mastered</span>
          <span class="chip-label-short" data-i18n="filterMasteredShort">★</span>
        </button>
        <button type="button" class="chip" data-filter="not-mastered">
          <span class="chip-label-long" data-i18n="filterNotMastered">Not mastered</span>
          <span class="chip-label-short" data-i18n="filterNotMasteredShort">☆</span>
        </button>
      </div>
      <div class="filters compare-filters hidden" id="filters-compare" hidden>
        <button type="button" class="chip active" data-compare-filter="all" data-i18n="compareFilterAll">All</button>
        <button type="button" class="chip" data-compare-filter="both" data-i18n="compareFilterBoth">Both have</button>
        <button type="button" class="chip" data-compare-filter="only-a" data-i18n="compareFilterOnlyA">Only A</button>
        <button type="button" class="chip" data-compare-filter="only-b" data-i18n="compareFilterOnlyB">Only B</button>
        <button type="button" class="chip" data-compare-filter="neither" data-i18n="compareFilterNeither">Neither</button>
      </div>
      <div class="filters filters-material" id="filters-material"></div>
      <div class="filters filters-rarity" id="filters-rarity">
        <button type="button" class="rarity-pad rarity-pad-all active" data-rarity-filter="all" aria-label="Any rarity"></button>
        <button type="button" class="rarity-pad" data-rarity-filter="rare" aria-label="Rare">R</button>
        <button type="button" class="rarity-pad" data-rarity-filter="epic" aria-label="Epic">E</button>
        <button type="button" class="rarity-pad" data-rarity-filter="legendary" aria-label="Legendary">L</button>

  <main id="app">
    <div class="loading" id="loading" data-i18n="loading">Loading</div>

  <div class="save-prompt-overlay hidden" id="save-prompt" hidden>
    <div class="save-prompt">

  <div class="toast" id="toast" aria-live="polite"></div>

  <div class="compare-overlay hidden" id="compare-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="compare-title">
    <div class="compare-sheet">
      <h2 id="compare-title" data-i18n="compareTitle">Compare collections</h2>
      <p data-i18n="compareHint">Paste share links or the ?s= token from each collection.</p>
      <div class="compare-field">
        <label for="compare-input-a" data-i18n="compareLabelA">Collection A</label>

        <label class="compare-use-mine">

        </label>
      </div>
      <div class="compare-field">
        <label for="compare-input-b" data-i18n="compareLabelB">Collection B</label>
        <input type="text" id="compare-input-b" data-i18n-placeholder="comparePlaceholder" placeholder="Share link or ?s= token…" autocomplete="off" />
      </div>
      <div class="compare-actions">
        <button type="button" class="btn-cancel" id="compare-cancel" data-i18n="compareCancel">Cancel</button>
        <button type="button" class="btn-run" id="compare-run" data-i18n="compareRun">Compare</button>

  <div class="guide-overlay hidden" id="guide-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="guide-title">
    <div class="guide-sheet">
      <div class="guide-head">
        <h2 id="guide-title" data-i18n="guideTitle">How Sprites Work</h2>
        <button type="button" class="guide-close" id="guide-close" data-i18n="guideClose">Close</button>
      </div>
      <div class="guide-body" id="guide-body"></div>
    </div>
  </div>

  <div class="detail-overlay hidden" id="detail-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <div class="detail-sheet" id="detail-sheet">
      <div class="detail-head">
        <div class="detail-img-wrap">
          <img id="detail-img" src="" alt="" />
        </div>
        <div class="detail-titles">
          <h3 id="detail-title"></h3>
          <p id="detail-subtitle"></p>
          <span class="rarity-pill" id="detail-rarity" hidden></span>
        </div>
      </div>
      <dl class="detail-meta" id="detail-meta"></dl>
      <div class="detail-actions">
        <button type="button" class="btn-toggle" id="detail-toggle"></button>
        <button type="button" class="btn-mastery" id="detail-mastery"></button>
        <button type="button" class="btn-close" id="detail-close" data-i18n="detailClose">Close</button>
      </div>
    </div>
  </div>

  <script>
    const CONFIG_URL = "sprites-config.json";
    const HD_MAP_URL = "sprites-hd-map.json";
    const ASSET_VERSION = "v10";
    const STORAGE_KEY = "klombo-tracker-collected-v1";
    const MASTERY_STORAGE_KEY = "klombo-tracker-mastered-v2";
    const SHARE_PARAM = "s";

    let config = null;
    let hdMap = null;
    let catalog = [];
    let collected = new Set();
    let mastered = new Set();
    let filter = "all";
    let materialFilter = "all";
    let rarityFilter = "all";
    let searchQuery = "";
    let readOnly = false;
    let compareMode = false;
    let compareFilter = "all";
    let compareSetA = null;
    let compareSetB = null;
    let compareUseMineA = true;

    const $app = document.getElementById("app");
    const $title = document.getElementById("title");
    const $progressLabel = document.getElementById("progress-label");
    const $progressText = document.getElementById("progress-text");
    const $progressPct = document.getElementById("progress-pct");
    const $progressFill = document.getElementById("progress-fill");
    const $progressBreakdown = document.getElementById("progress-breakdown");
    const $search = document.getElementById("search");
    const $btnShare = document.getElementById("btn-share");
    const $btnExportPng = document.getElementById("btn-export-png");
    const $btnCompare = document.getElementById("btn-compare");
    const $sharedBanner = document.getElementById("shared-banner");
    const $compareBanner = document.getElementById("compare-banner");
    const $compareStats = document.getElementById("compare-stats");
    const $compareBannerTitle = document.getElementById("compare-banner-title");
    const $filters = document.getElementById("filters");
    const $filtersMaterial = document.getElementById("filters-material");
    const $filtersRarity = document.getElementById("filters-rarity");
    const $filterBar = document.getElementById("filter-bar");
    const $filtersCompare = document.getElementById("filters-compare");
    const $spriteRail = document.getElementById("sprite-rail");
    const $compareOverlay = document.getElementById("compare-overlay");
    const $compareInputA = document.getElementById("compare-input-a");
    const $compareInputB = document.getElementById("compare-input-b");
    const $compareUseMine = document.getElementById("compare-use-mine");
    const $guideOverlay = document.getElementById("guide-overlay");
    const $guideBody = document.getElementById("guide-body");
    const $btnGuide = document.getElementById("btn-guide");
    const $savePrompt = document.getElementById("save-prompt");
    const $toast = document.getElementById("toast");
    const $detailOverlay = document.getElementById("detail-overlay");
    const $detailSheet = document.getElementById("detail-sheet");
    const $detailImg = document.getElementById("detail-img");
    const $detailTitle = document.getElementById("detail-title");
    const $detailSubtitle = document.getElementById("detail-subtitle");
    const $detailRarity = document.getElementById("detail-rarity");
    const $detailMeta = document.getElementById("detail-meta");
    const $detailToggle = document.getElementById("detail-toggle");
    const $detailMastery = document.getElementById("detail-mastery");
    const $detailClose = document.getElementById("detail-close");

    let toastTimer = null;
    let detailItem = null;
    let lastGrouped = [];

    const MATERIAL_FILTER_ORDER = ["base", "gold", "gummy", "galaxy", "holofoil", "gem", "cube", "quack"];
    const MATERIAL_PAD_LABEL = {
      base: "Ba",
      gold: "Go",
      gummy: "Gu",
      galaxy: "Ga",
      holofoil: "Ho",
      gem: "Ge",
      cube: "Cu",
      quack: "Qu",
    };

    const MATERIAL_PAD_STYLE = {
      base: {
        bg: "linear-gradient(145deg, #a8b4c8 0%, #6b7a92 100%)",
        glow: "rgba(168, 180, 200, 0.55)",
        ink: "#1a1040",
      },
      gold: {
        bg: "linear-gradient(145deg, #ffe566 0%, #e8a317 55%, #b8740a 100%)",
        glow: "rgba(255, 214, 74, 0.7)",
        ink: "#3b2200",
      },
      gummy: {
        bg: "linear-gradient(135deg, #ef4444 0%, #dc2626 55%, #b91c1c 70%, #22c55e 100%)",
        glow: "rgba(239, 68, 68, 0.6)",
        ink: "#fff",
      },
      galaxy: {
        bg: "linear-gradient(145deg, #1e3a8a 0%, #312e81 42%, #6b21a8 100%)",
        glow: "rgba(107, 33, 168, 0.68)",
        ink: "#fff",
      },
      holofoil: {
        bg: "linear-gradient(135deg, #5eead4 0%, #67b8ff 28%, #c084fc 56%, #f472b6 78%, #38bdf8 100%)",
        glow: "rgba(94, 231, 255, 0.7)",
        ink: "#0a0618",
      },
      gem: {
        bg: "linear-gradient(145deg, #f8fafc 0%, #e2e8f0 45%, #94a3b8 100%)",
        glow: "rgba(203, 213, 225, 0.75)",
        ink: "#1a1040",
      },
      cube: {
        bg: "linear-gradient(145deg, #1e3a8a 0%, #0f172a 58%, #020617 100%)",
        glow: "rgba(30, 58, 138, 0.72)",
        ink: "#fff",
      },
      quack: {
        bg: "linear-gradient(145deg, #faf5ff 0%, #e9d5ff 18%, #c084fc 42%, #9333ea 68%, #5b21b6 88%, #2e1065 100%)",
        glow: "rgba(192, 132, 252, 0.75)",
        ink: "#fff",
      },
    };

    function catalogMaterialIds() {
      return [...new Set(catalog.map((item) => item.materialId))];
    }

    function applyMaterialPadStyle(chip, materialId) {
      const style = MATERIAL_PAD_STYLE[materialId];
      if (!style) return;
      chip.style.background = style.bg;
      chip.style.color = style.ink;
      chip.style.setProperty("--mat-glow", style.glow);
      chip.style.textShadow = style.ink === "#fff"
        ? "0 1px 3px rgba(0, 0, 0, 0.45)"
        : "none";
    }

    function buildMaterialFilters() {
      if (!$filtersMaterial) return;
      const present = new Set(catalogMaterialIds());
      const materials = ["all", ...MATERIAL_FILTER_ORDER.filter((id) => present.has(id))];
      $filtersMaterial.style.setProperty("--mat-count", String(materials.length));
      $filtersMaterial.innerHTML = "";
      for (const materialId of materials) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = materialId === "all" ? "mat-pad mat-pad-all" : "mat-pad";
        chip.dataset.materialFilter = materialId;
        const label = materialId === "all"
          ? SpritedexI18n.t("filterMaterialAll")
          : SpritedexI18n.materialName(materialId);
        chip.setAttribute("aria-label", label);
        chip.title = label;
        if (materialId !== "all") {
          applyMaterialPadStyle(chip, materialId);
          chip.textContent = MATERIAL_PAD_LABEL[materialId] || materialId.slice(0, 2);
        }
        chip.classList.toggle("active", materialFilter === materialId);
        $filtersMaterial.appendChild(chip);
      }
    }

    function applyRarityPadLabels() {
      const keys = {
        all: "filterRarityAll",
        rare: "rarityRare",
        epic: "rarityEpic",
        legendary: "rarityLegendary",
        mythic: "rarityMythic",
      };
      document.querySelectorAll("#filters-rarity .rarity-pad").forEach((btn) => {
        const key = keys[btn.dataset.rarityFilter];
        if (!key) return;
        const label = SpritedexI18n.t(key);
        btn.setAttribute("aria-label", label);
        btn.title = label;
      });
    }

    function syncFilterChips() {
      document.querySelectorAll("#filters .chip").forEach((c) => {
        c.classList.toggle("active", c.dataset.filter === filter);
      });
      document.querySelectorAll("#filters-material .mat-pad").forEach((c) => {
        c.classList.toggle("active", c.dataset.materialFilter === materialFilter);
      });
      document.querySelectorAll("#filters-rarity .rarity-pad").forEach((c) => {
        c.classList.toggle("active", c.dataset.rarityFilter === rarityFilter);
      });
    }

    function baseSpriteEntry(spriteId) {
      return catalog.find((c) => c.spriteId === spriteId && c.materialId === "base")
        || catalog.find((c) => c.spriteId === spriteId);
    }

    function updateHeaderOffset() {
      const header = document.querySelector("header");
      document.documentElement.style.setProperty(
        "--header-offset",
        header ? `${Math.ceil(header.getBoundingClientRect().height)}px` : "200px"
      );
    }

    function getHeaderScrollOffset(extra = 8) {
      const px = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--header-offset"));
      return (Number.isFinite(px) ? px : 200) + extra;
    }

    function scrollToSection(section) {
      if (!section) return;
      updateHeaderOffset();
      const top = section.getBoundingClientRect().top + window.scrollY - getHeaderScrollOffset();
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    function jumpToSprite(spriteId) {
      let section = document.getElementById(`sprite-${spriteId}`);
      if (!section) {
        materialFilter = "all";
        filter = "all";
        rarityFilter = "all";
        searchQuery = "";
        $search.value = "";
        syncFilterChips();
        render();
        section = document.getElementById(`sprite-${spriteId}`);
      }
      if (!section) return;
      requestAnimationFrame(() => scrollToSection(section));
    }

    function updateSpriteRail(grouped) {
      updateHeaderOffset();
      if (!$spriteRail) return;
      if (compareMode || window.matchMedia("(min-width: 720px)").matches) {
        $spriteRail.classList.add("hidden");
        $spriteRail.innerHTML = "";
        return;
      }

      $spriteRail.setAttribute("aria-label", SpritedexI18n.t("spriteRailLabel"));
      $spriteRail.classList.remove("hidden");
      $spriteRail.innerHTML = "";

      for (const [spriteId] of grouped) {
        const base = baseSpriteEntry(spriteId);
        if (!base) continue;
        const section = document.getElementById(`sprite-${spriteId}`);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `sprite-rail-btn${section ? "" : " dimmed"}`;
        btn.title = displaySprite({ spriteId });
        btn.setAttribute("aria-label", displaySprite({ spriteId }));
        const img = document.createElement("img");
        img.src = base.image;
        img.alt = "";
        img.loading = "lazy";
        img.onerror = function onRailImgErr() {
          this.onerror = null;
          if (base.fallbackImage) this.src = assetUrl(base.fallbackImage);
        };
        btn.appendChild(img);
        btn.addEventListener("click", () => jumpToSprite(spriteId));
        $spriteRail.appendChild(btn);
      }
    }

    const MATERIAL_THEME = {
      base: {
        accent: "#b8c2d4",
        glow: "rgba(184, 194, 212, 0.55)",
        fill: "rgba(148, 163, 184, 0.22)",
        gradient: "linear-gradient(145deg, rgba(148,163,184,0.28), rgba(51,65,85,0.12))",
      },
      gold: {
        accent: "#fbbf24",
        glow: "rgba(251, 191, 36, 0.7)",
        fill: "rgba(251, 191, 36, 0.32)",
        gradient: "linear-gradient(145deg, rgba(251,191,36,0.42), rgba(245,158,11,0.15))",
      },
      gummy: {
        accent: "#f472b6",
        glow: "rgba(244, 114, 182, 0.65)",
        fill: "rgba(244, 114, 182, 0.3)",
        gradient: "linear-gradient(145deg, rgba(244,114,182,0.4), rgba(219,39,119,0.12))",
      },
      galaxy: {
        accent: "#818cf8",
        glow: "rgba(129, 140, 248, 0.7)",
        fill: "rgba(129, 140, 248, 0.32)",
        gradient: "linear-gradient(145deg, rgba(129,140,248,0.42), rgba(79,70,229,0.15))",
      },
      holofoil: {
        accent: "#22d3ee",
        glow: "rgba(34, 211, 238, 0.75)",
        fill: "rgba(34, 211, 238, 0.28)",
        gradient: "linear-gradient(145deg, rgba(34,211,238,0.38), rgba(6,182,212,0.12))",
      },
      gem: {
        accent: "#c084fc",
        glow: "rgba(192, 132, 252, 0.7)",
        fill: "rgba(192, 132, 252, 0.3)",
        gradient: "linear-gradient(145deg, rgba(192,132,252,0.4), rgba(147,51,234,0.14))",
      },
      cube: {
        accent: "#38bdf8",
        glow: "rgba(56, 189, 248, 0.75)",
        fill: "rgba(56, 189, 248, 0.28)",
        gradient: "linear-gradient(145deg, rgba(56,189,248,0.38), rgba(14,116,144,0.18))",
      },
      quack: {
        accent: "#facc15",
        glow: "rgba(250, 204, 21, 0.75)",
        fill: "rgba(250, 204, 21, 0.3)",
        gradient: "linear-gradient(145deg, rgba(250,204,21,0.42), rgba(202,138,4,0.15))",
      },
    };

    function applyMaterialTheme(card, materialId) {
      const theme = MATERIAL_THEME[materialId] || MATERIAL_THEME.base;
      card.dataset.material = materialId;
      card.style.setProperty("--mat-accent", theme.accent);
      card.style.setProperty("--mat-glow", theme.glow);
      card.style.setProperty("--mat-fill", theme.fill);
      card.style.setProperty("--mat-gradient", theme.gradient);
    }

    function applyStaticI18n() {
      document.title = SpritedexI18n.t("appTitle");
      $title.textContent = SpritedexI18n.t("trackerTitle");

    function toBase64Url(bytes) {
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function fromBase64Url(str) {
      const padded = str.replace(/-/g, "+").replace(/_/g, "/");
      const pad = padded.length % 4 ? "=".repeat(4 - (padded.length % 4)) : "";
      const binary = atob(padded + pad);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function encodeShareBitmap(items, set) {
      const n = items.length;
      const header = new Uint8Array(2);
      header[0] = (n >> 8) & 0xff;
      header[1] = n & 0xff;
      const bitmap = new Uint8Array(Math.ceil(n / 8));
      items.forEach((item, i) => {
        if (set.has(item.id)) bitmap[Math.floor(i / 8)] |= 1 << (i % 8);
      });
      const packed = new Uint8Array(header.length + bitmap.length);
      packed.set(header);
      packed.set(bitmap, header.length);
      return toBase64Url(packed);
    }

    function decodeShareBitmap(items, encoded) {
      const packed = fromBase64Url(encoded);
      if (packed.length < 2) return null;
      const count = (packed[0] << 8) | packed[1];
      if (count !== items.length) return null;
      const bitmap = packed.subarray(2);
      const needed = Math.ceil(count / 8);
      if (bitmap.length < needed) return null;
      const set = new Set();
      items.forEach((item, i) => {
        if (bitmap[Math.floor(i / 8)] & (1 << (i % 8))) set.add(item.id);
      });
      return set;
    }

    function buildShareUrl() {
      const token = encodeShareBitmap(catalog, collected);
      const url = new URL(location.href);
      url.search = "";
      url.searchParams.set(SHARE_PARAM, token);
      return url.toString();
    }

    function parseShareFromUrl(items) {
      const token = new URLSearchParams(location.search).get(SHARE_PARAM);
      if (!token) return null;
      return decodeShareBitmap(items, token);
    }

    function clearShareFromUrl() {
      const url = new URL(location.href);
      if (!url.searchParams.has(SHARE_PARAM)) return;
      url.searchParams.delete(SHARE_PARAM);
      history.replaceState(null, "", url.pathname + url.hash);
    }

    function extractShareToken(input) {
      const trimmed = String(input || "").trim();
      if (!trimmed) return null;
      try {
        if (trimmed.includes("://") || trimmed.startsWith("?") || trimmed.startsWith("/")) {
          const url = new URL(trimmed, location.href);
          return url.searchParams.get(SHARE_PARAM);
        }
      } catch (_) {
        /* fall through to raw token */
      }
      return trimmed;
    }

    function parseShareInput(items, input) {
      const token = extractShareToken(input);
      if (!token) return null;
      return decodeShareBitmap(items, token);
    }

    function getCompareSetA() {
      if (compareUseMineA) return collected;
      return compareSetA || new Set();
    }

    function getCompareSetB() {
      return compareSetB || new Set();
    }

    function getCompareState(item) {
      const inA = getCompareSetA().has(item.id);
      const inB = getCompareSetB().has(item.id);
      if (inA && inB) return "both";
      if (inA) return "only-a";
      if (inB) return "only-b";
      return "neither";
    }

    function countCompareStats() {
      let a = 0;
      let b = 0;
      let both = 0;
      let onlyA = 0;
      let onlyB = 0;
      let neither = 0;
      for (const item of catalog) {
        const state = getCompareState(item);
        if (getCompareSetA().has(item.id)) a += 1;
        if (getCompareSetB().has(item.id)) b += 1;
        if (state === "both") both += 1;
        else if (state === "only-a") onlyA += 1;
        else if (state === "only-b") onlyB += 1;
        else neither += 1;
      }
      return { a, b, both, onlyA, onlyB, neither, total: catalog.length };
    }

        <span>${SpritedexI18n.t("compareStatOnlyA")}: <strong>${stats.onlyA}</strong></span>

    function exitCompareMode() {

      compareSetB = null;

    function startCompareMode() {
      const useMine = $compareUseMine.checked;
      let setA = null;
      if (useMine) {
        setA = collected;
      } else {
        setA = parseShareInput(catalog, $compareInputA.value);
        if (!setA) {
          showToast(SpritedexI18n.t("compareError"));
          return;
        }
      }

      const setB = parseShareInput(catalog, $compareInputB.value);
      if (!setB) {
        showToast(SpritedexI18n.t("compareError"));
        return;
      }

      compareUseMineA = useMine;
      compareSetA = useMine ? null : setA;
      compareSetB = setB;
      compareMode = true;
      compareFilter = "all";
      closeCompareModal();
      updateCompareBanner();
      render();
    }

    const EXPORT_MATERIAL_ORDER = ["base", "gold", "gummy", "galaxy", "gem", "holofoil", "cube", "quack"];
    const exportImageCache = new Map();
    let exportInFlight = false;

    function sortExportGroup(items) {
      return [...items].sort((a, b) => {
        const ia = EXPORT_MATERIAL_ORDER.indexOf(a.materialId);
        const ib = EXPORT_MATERIAL_ORDER.indexOf(b.materialId);
        return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
      });
    }

    function exportImageCandidates(item) {
      return [...new Set([
        item.hdImage,
        item.image,
        item.fallbackImage,
        namedImagePath(item),
        item.source ? `sprites/${String(item.source).replace(/^sprites\//, "")}` : null,
      ].filter(Boolean))];
    }

    function loadExportImageUrl(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.decoding = "async";
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Failed: ${src}`));
        img.src = new URL(assetUrl(src), location.href).href;
      });
    }

    async function loadExportImage(item) {
      if (exportImageCache.has(item.id)) return exportImageCache.get(item.id);

      for (const src of exportImageCandidates(item)) {
        try {
          const img = await loadExportImageUrl(src);
          exportImageCache.set(item.id, img);
          return img;
        } catch (_) {
          /* try next source */
        }
      }

      exportImageCache.set(item.id, null);
      return null;
    }

    async function preloadExportImages(items) {
      const batchSize = 12;
      for (let i = 0; i < items.length; i += batchSize) {
        const batch = items.slice(i, i + batchSize);
        await Promise.all(batch.map((item) => loadExportImage(item)));
      }
    }

    function drawExportCheckbox(ctx, x, y, size, isCollected) {
      ctx.save();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
      ctx.fillStyle = isCollected ? "#22d3ee" : "rgba(0, 0, 0, 0.35)";
      ctx.beginPath();
      ctx.roundRect(x, y, size, size, 2);
      ctx.fill();
      ctx.stroke();
      if (isCollected) {
        ctx.strokeStyle = "#0a0618";
        ctx.lineWidth = 2.2;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(x + size * 0.22, y + size * 0.52);
        ctx.lineTo(x + size * 0.44, y + size * 0.72);
        ctx.lineTo(x + size * 0.8, y + size * 0.28);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawExportMasterStar(ctx, x, y, size) {
      ctx.save();
      ctx.font = `bold ${size}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#fbbf24";
      ctx.shadowColor = "rgba(251, 191, 36, 0.8)";
      ctx.shadowBlur = 6;
      ctx.fillText("★", x, y);
      ctx.restore();
    }

    function drawExportPlaceholder(ctx, x, y, size) {
      ctx.save();
      ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
      ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, size, size, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
      ctx.font = `bold ${Math.round(size * 0.35)}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("?", x + size / 2, y + size / 2);
      ctx.restore();
    }

    function drawExportCell(ctx, item, img, x, y, spriteSize, checkSize) {
      const isCollected = collected.has(item.id);
      const isMastered = mastered.has(item.id);
      const spriteX = x + (70 - spriteSize) / 2;

      ctx.save();
      if (!isCollected) ctx.filter = "grayscale(1) brightness(0.55)";
      if (img) {
        ctx.drawImage(img, spriteX, y, spriteSize, spriteSize);
      } else {
        drawExportPlaceholder(ctx, spriteX, y, spriteSize);
      }
      ctx.restore();

      if (isMastered) {
        drawExportMasterStar(ctx, spriteX + spriteSize - 4, y + 6, 11);
      }

      drawExportCheckbox(
        ctx,
        x + (70 - checkSize) / 2,
        y + spriteSize + 6,
        checkSize,
        isCollected
      );
    }

    function buildExportCanvas(groups, images) {
      const pad = 28;
      const spriteSize = 56;
      const checkSize = 16;
      const cellW = 70;
      const cellH = spriteSize + checkSize + 10;
      const rowGap = 16;
      const maxCols = Math.max(...groups.map(([, items]) => items.length), 1);
      const contentW = maxCols * cellW + Math.max(0, maxCols - 1) * 10;
      const width = Math.max(720, contentW + pad * 2);
      const headerH = 78;
      const footerH = 34;
      const height = headerH + groups.length * cellH + Math.max(0, groups.length - 1) * rowGap + footerH + pad;

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      const bg = ctx.createLinearGradient(0, 0, width, height);
      bg.addColorStop(0, "#120a28");
      bg.addColorStop(1, "#0a0618");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      const done = catalog.filter((item) => collected.has(item.id)).length;
      const total = catalog.length;
      const masteredCount = catalog.filter((item) => mastered.has(item.id)).length;

      ctx.fillStyle = "#f5f0ff";
      ctx.font = "bold 22px system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(SpritedexI18n.t("exportPngHeader"), pad, 34);

      ctx.fillStyle = "#a5f3fc";
      ctx.font = "600 15px system-ui, sans-serif";
      ctx.fillText(`${done}/${total}`, pad, 58);

      ctx.fillStyle = "#fde68a";
      ctx.fillText(`★ ${masteredCount}/${total}`, pad + 72, 58);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
      ctx.beginPath();
      ctx.moveTo(pad, headerH - 10);
      ctx.lineTo(width - pad, headerH - 10);
      ctx.stroke();

      let rowY = headerH;
      for (const [, items] of groups) {
        const rowW = items.length * cellW + Math.max(0, items.length - 1) * 10;
        let x = pad + Math.max(0, (width - pad * 2 - rowW) / 2);
        for (const item of items) {
          drawExportCell(ctx, item, images.get(item.id), x, rowY, spriteSize, checkSize);
          x += cellW + 10;
        }
        rowY += cellH + rowGap;
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
      ctx.font = "600 12px system-ui, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(SpritedexI18n.t("exportPngWatermark"), width - pad, height - 14);

      return { canvas, done, total };
    }

    function downloadCanvasPng(canvas, done, total) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("toBlob failed"));
            return;
          }
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = `fortnite-sprites-${done}-of-${total}.png`;
          link.click();
          URL.revokeObjectURL(url);
          resolve();
        }, "image/png");
      });
    }

    async function exportCollectionPng() {
      if (exportInFlight || !catalog.length) return;
      exportInFlight = true;
      $btnExportPng.disabled = true;
      showToast(SpritedexI18n.t("exportPngGenerating"));

      try {
        const groups = groupCatalog(catalog).map(([spriteId, items]) => [spriteId, sortExportGroup(items)]);
        const flat = groups.flatMap(([, items]) => items);
        await preloadExportImages(flat);

        const images = new Map(flat.map((item) => [item.id, exportImageCache.get(item.id) ?? null]));
        const { canvas, done, total } = buildExportCanvas(groups, images);
        await downloadCanvasPng(canvas, done, total);
        showToast(SpritedexI18n.t("exportPngDone"));
      } catch (err) {
        console.error(err);
        showToast(SpritedexI18n.t("exportPngError"));
      } finally {
        exportInFlight = false;
        $btnExportPng.disabled = false;
      }
    }

    async function shareCollection() {
      if (!catalog.length) return;
      try {
        const shareUrl = buildShareUrl();
        if (navigator.share) {
          try {
            await navigator.share({
              title: SpritedexI18n.t("appTitle"),
              url: shareUrl,
            });
            return;
          } catch (err) {
            if (err?.name === "AbortError") return;
          }
        }
        await navigator.clipboard.writeText(shareUrl);
        showToast(SpritedexI18n.t("shareCopied"));
      } catch (_) {
        showToast(SpritedexI18n.t("shareError"));
      }
    }

    function adoptSharedCollection() {
      readOnly = false;
      saveCollected();
      clearShareFromUrl();

    function loadCollected() {

    function loadMastered() {

        if (!raw) return new Set();

    function saveMastered() {
      localStorage.setItem(MASTERY_STORAGE_KEY, JSON.stringify([...mastered]));
    }

    function pruneMastered() {
      let changed = false;
      for (const id of mastered) {
        if (!collected.has(id)) {
          mastered.delete(id);
          changed = true;
        }
      }

    function toggleMastered(id) {

        showSavePrompt();
        return false;
      }
      if (mastered.has(id)) {
        mastered.delete(id);
      } else {
