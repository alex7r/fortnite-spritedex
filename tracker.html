    function saveCollected() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...collected]));
    }

    function assetUrl(path) {
      if (!path) return path;
      const base = String(path).split("?")[0];
      return `${base}?${ASSET_VERSION}`;
    }

    function assetPath(url) {
      return String(url || "").split("?")[0];
    }

    function namedImagePath(item) {
      if (item.output) {
        const out = item.output.replace(/^sprites_named\//, "");
        return `sprites_named/${out}`;
      }
      if (item.filename) return `sprites_named/${item.filename}`;
      return null;
    }

    function imagePath(item) {
      const path = item.hdImage
        || namedImagePath(item)
        || `sprites/${item.source?.replace(/^sprites\//, "") || item.id}.png`;
      return assetUrl(path);
    }

    function resolveHdImage(item) {
      if (!hdMap) return null;
      return hdMap.byId?.[item.id]
        ?? hdMap.byKey?.[`${item.spriteId}:${item.materialId}`]
        ?? null;
    }

    function enrichCatalogEntry(entry, cfg) {
      const sm = cfg.meta?.sprites?.[entry.spriteId];
      if (sm) {
        entry.rarity = sm.rarity;
        entry.ability = sm.ability;
        entry.spawnHint = sm.spawnHint;
        entry.dropRate = sm.dropRate ?? null;
      }
      const mm = cfg.meta?.materials?.[entry.materialId];
      if (mm?.bonus) entry.variantBonus = mm.bonus;
      const rarity = sm?.rarity;
      const costTable = rarity && cfg.meta?.raritySummonCost?.[rarity];
      if (costTable) {
        entry.summonCost = entry.materialId === "base" ? costTable.base : costTable.variant;
      }
      return entry;
    }

    function buildCatalog(cfg) {
      if (Array.isArray(cfg.catalog) && cfg.catalog.length) {
        return cfg.catalog.map((item) => {
          const entry = enrichCatalogEntry({
            id: item.id,
            spriteId: item.spriteId || item.character,
            materialId: item.materialId || item.material || cfg.defaultMaterial || "base",
            filename: item.filename,
            output: item.output,
            source: item.source,
            fallbackImage: namedImagePath(item),
          }, cfg);
          entry.hdImage = resolveHdImage(entry);
          entry.image = imagePath(entry);
          return entry;
        });
      }

      const items = [];
      for (const group of cfg.groups || []) {
        const spriteId = group.spriteId || group.name;
        for (const sprite of group.sprites || []) {
          const materialId = sprite.materialId
            || cfg.materialAliases?.[sprite.type || sprite.material || ""]
            || sprite.material
            || sprite.type
            || cfg.defaultMaterial
            || "base";
          const fallback = sprite.output
            ? `sprites_named/${sprite.output}`
            : namedImagePath(sprite);
          const entry = enrichCatalogEntry({
            id: sprite.id || sprite.source?.replace(/\.png$/i, ""),
            spriteId,
            materialId,
            filename: sprite.output,
            fallbackImage: fallback,
          }, cfg);
          entry.hdImage = resolveHdImage(entry);
          entry.image = imagePath(entry);
          items.push(entry);
        }
      }
      return items;
    }

    function displaySprite(item) {
      return SpritedexI18n.spriteName(item.spriteId);
    }

    function displayMaterial(item) {
      return SpritedexI18n.materialName(item.materialId);
    }

    function spriteOrderIndex(spriteId) {
      const order = config?.meta?.spriteOrder;
      if (!Array.isArray(order) || !order.length) return Number.MAX_SAFE_INTEGER;
      const idx = order.indexOf(spriteId);
      return idx === -1 ? Number.MAX_SAFE_INTEGER : idx;
    }

    function groupCatalog(items) {
      const map = new Map();
      for (const item of items) {
        const key = item.spriteId;
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      }
      return [...map.entries()].sort((a, b) => {
        const orderDiff = spriteOrderIndex(a[0]) - spriteOrderIndex(b[0]);
        if (orderDiff !== 0) return orderDiff;
        return a[0].localeCompare(b[0]);
      });
    }

    function matchesSearch(item) {
      if (!searchQuery) return true;
      const q = searchQuery.toLocaleLowerCase();
      return (
        displaySprite(item).toLocaleLowerCase().includes(q) ||
        displayMaterial(item).toLocaleLowerCase().includes(q)
      );
    }

    const RARITY_WEIGHT = { mythic: 400, legendary: 300, epic: 200, rare: 100 };
    const MATERIAL_WEIGHT = { quack: 70, cube: 62, holofoil: 55, gem: 52, galaxy: 45, gummy: 35, gold: 22, base: 0 };
    const VARIANT_DROP_MULT = {
      base: 1,
      gold: 0.06,
      gummy: 0.008,
      galaxy: 0.003,
      holofoil: 0.002,
      gem: 0.002,
      cube: 0.0005,
      quack: 0.0000001,
    };

    function itemRarityScore(item) {
      const rarity = RARITY_WEIGHT[item.rarity] ?? 0;
      const material = MATERIAL_WEIGHT[item.materialId] ?? 10;
      const baseDrop = item.dropRate
        ?? config?.meta?.sprites?.[item.spriteId]?.dropRate
        ?? 0.05;
      const mult = VARIANT_DROP_MULT[item.materialId] ?? 0.01;
      const effectiveDrop = baseDrop * mult;
      return rarity * 1e6 + material * 1e3 + (1 / Math.max(effectiveDrop, 1e-12));
    }

    function getRarestMissing(limit = 8) {
      return catalog
        .filter((item) => !collected.has(item.id))
        .sort((a, b) => itemRarityScore(b) - itemRarityScore(a))
        .slice(0, limit);
    }

    function countBaseSpritesProgress() {
      const spriteIds = [...new Set(catalog.map((c) => c.spriteId))];
      let done = 0;
      for (const spriteId of spriteIds) {
        const baseEntry = catalog.find((c) => c.spriteId === spriteId && c.materialId === "base");
        if (baseEntry && collected.has(baseEntry.id)) done += 1;
      }
      return { done, total: spriteIds.length };
    }

    function renderRarestPanel() {
      const panel = document.createElement("section");
      panel.className = "rarest-panel";
      panel.innerHTML = `<h2>${SpritedexI18n.t("rarestMissing")}</h2>`;

      const missing = getRarestMissing();
      if (!missing.length) {
        const p = document.createElement("p");
        p.className = "rarest-done";
        p.textContent = SpritedexI18n.t("rarestMissingDone");
        panel.appendChild(p);
        return panel;
      }

      const scroll = document.createElement("div");
      scroll.className = "rarest-scroll";
      for (const item of missing) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "rarest-card";
        btn.innerHTML = `
          <img src="${item.image}" alt="" loading="lazy" decoding="async" />
          <strong>${displaySprite(item)}</strong>
          <span>${displayMaterial(item)}</span>
        `;
        btn.addEventListener("click", () => openDetail(item));
        scroll.appendChild(btn);
      }
      panel.appendChild(scroll);
      return panel;
    }

    function matchesFilter(item) {
      const isCollected = collected.has(item.id);
      const isMastered = mastered.has(item.id);
      if (compareMode) {
        const state = getCompareState(item);
        if (compareFilter === "both") return state === "both";
        if (compareFilter === "only-a") return state === "only-a";
        if (compareFilter === "only-b") return state === "only-b";
        if (compareFilter === "neither") return state === "neither";
        return true;
      }
      if (filter === "collected") return isCollected;
      if (filter === "missing") return !isCollected;
      if (filter === "mastered") return isMastered;
      if (filter === "not-mastered") return !isMastered;
      return true;
    }

    function matchesRarity(item) {
      if (rarityFilter === "all") return true;
      return item.rarity === rarityFilter;
    }

    function matchesMaterial(item) {
      if (materialFilter === "all") return true;
      return item.materialId === materialFilter;
    }

    function computeSummonLoadout() {
      let total = 0;
      for (const item of catalog) {
        if (collected.has(item.id) && item.summonCost) total += item.summonCost;
      }
      return total;
    }

    function updateProgress() {
      const total = catalog.length;
      const done = catalog.filter((s) => collected.has(s.id)).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      $progressText.textContent = `${done} / ${total}`;
      $progressPct.textContent = `${pct}%`;
      $progressFill.style.width = `${pct}%`;

      const bases = countBaseSpritesProgress();
      const loadout = computeSummonLoadout();
      const masteredCount = catalog.filter((item) => mastered.has(item.id)).length;
      $progressBreakdown.innerHTML = `
        <span>${SpritedexI18n.t("progressSprites")}: <strong>${bases.done}/${bases.total}</strong></span>
        <span>${SpritedexI18n.t("progressVariants")}: <strong>${done}/${total}</strong></span>
        <span>${SpritedexI18n.t("progressMastered")}: <strong>${masteredCount}/${total}</strong></span>
        <span>${SpritedexI18n.t("summonLoadout")}: <strong>${loadout.toLocaleString()} ${SpritedexI18n.t("dust")}</strong></span>
      `;
    }

    function toggleSprite(id) {
      if (readOnly) {
        showSavePrompt();
        return false;
      }
      if (collected.has(id)) {
        collected.delete(id);
        if (mastered.has(id)) {
          mastered.delete(id);
          saveMastered();
        }
      } else {
        collected.add(id);
      }
      saveCollected();
      updateProgress();
      render();
      return true;
    }

    function formatDropRate(rate) {
      if (rate == null || Number.isNaN(rate)) return null;
      if (rate < 0.0001) return "<0.01%";
      if (rate < 0.01) return `${(rate * 100).toFixed(3)}%`;
      return `${(rate * 100).toFixed(2)}%`;
    }

    function formatDust(amount) {
      if (amount == null) return null;
      return `${amount.toLocaleString()} ${SpritedexI18n.t("dust")}`;
    }

    function localizedField(field) {
      if (!field) return "";
      const locale = SpritedexI18n.getLocale();
      return field[locale] ?? field.en ?? "";
    }

    const GUIDE_RARITY_ORDER = ["rare", "epic", "legendary", "mythic"];
    const GUIDE_MATERIAL_ORDER = ["base", "gold", "gummy", "galaxy", "holofoil", "gem", "cube", "quack"];

    function rarityLabel(rarity) {
      const key = {
        rare: "rarityRare",
        epic: "rarityEpic",
        legendary: "rarityLegendary",
        mythic: "rarityMythic",
      }[rarity];
      return key ? SpritedexI18n.t(key) : rarity;
    }

    function buildGuideRarityTable() {
      const costs = config?.meta?.raritySummonCost;
      if (!costs) return "";
      const rows = GUIDE_RARITY_ORDER
        .filter((rarity) => costs[rarity])
        .map((rarity) => {
          const entry = costs[rarity];
          return `<tr>
            <td><span class="rarity-pill-inline" data-rarity="${rarity}">${rarityLabel(rarity)}</span></td>
            <td>${formatDust(entry.base)}</td>
            <td>${formatDust(entry.variant)}</td>
          </tr>`;
        })
        .join("");
      return `<table class="guide-table">
        <thead><tr>
          <th></th>
          <th>${SpritedexI18n.t("guideRarityBase")}</th>
          <th>${SpritedexI18n.t("guideRarityVariant")}</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function buildGuideMaterialList() {
      const materials = config?.meta?.materials || {};
      const items = GUIDE_MATERIAL_ORDER.map((materialId) => {
        const bonus = localizedField(materials[materialId]?.bonus);
        const name = SpritedexI18n.materialName(materialId);
        const text = bonus || (materialId === "base" ? SpritedexI18n.t("guideVariantsBaseNote") : "");
        if (!text) return "";
        return `<li><strong>${name}</strong><span class="muted"> — ${text}</span></li>`;
      }).filter(Boolean);
      return `<ul class="guide-list">${items.join("")}</ul>`;
    }

    function renderGuideContent() {
      $guideBody.innerHTML = `
        <section class="guide-section">
          <p>${SpritedexI18n.t("guideIntro")}</p>
        </section>
        <section class="guide-section">
          <h3>${SpritedexI18n.t("guideRaritiesTitle")}</h3>
          <p>${SpritedexI18n.t("guideRaritiesIntro")}</p>
          ${buildGuideRarityTable()}
        </section>
        <section class="guide-section">
          <h3>${SpritedexI18n.t("guideVariantsTitle")}</h3>
          <p>${SpritedexI18n.t("guideVariantsIntro")}</p>
          ${buildGuideMaterialList()}
        </section>
        <section class="guide-section">
          <h3>${SpritedexI18n.t("guideCollectionTitle")}</h3>
          <p>${SpritedexI18n.t("guideCollectionText")}</p>
        </section>
        <section class="guide-section">
          <h3>${SpritedexI18n.t("guideMasteryTitle")}</h3>
          <p>${SpritedexI18n.t("guideMasteryText")}</p>
        </section>
        <section class="guide-section">
          <h3>${SpritedexI18n.t("guideTrackerTitle")}</h3>
          <p>${SpritedexI18n.t("guideTrackerText")}</p>
        </section>
      `;
    }

    function openGuide() {
      renderGuideContent();
      $guideOverlay.hidden = false;
      $guideOverlay.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeGuide() {
      $guideOverlay.hidden = true;
      $guideOverlay.classList.add("hidden");
      if ($detailOverlay.hidden && $compareOverlay.hidden) document.body.style.overflow = "";
    }

    function rarityForSprite(spriteId) {
      return config?.meta?.sprites?.[spriteId]?.rarity ?? null;
    }

    function addDetailRow(label, value) {
      if (!value) return;
      const row = document.createElement("div");
      row.className = "detail-row";
      row.innerHTML = `<dt>${label}</dt><dd>${value}</dd>`;
      $detailMeta.appendChild(row);
    }

    function updateDetailMastery() {
      if (!detailItem) return;
      const isCollected = collected.has(detailItem.id);
      const isMastered = mastered.has(detailItem.id);
      $detailMastery.textContent = isMastered
        ? SpritedexI18n.t("masteryUnmark")
        : SpritedexI18n.t("masteryMark");
      $detailMastery.classList.toggle("active", isMastered);
      $detailMastery.disabled = !isCollected;
    }

    function updateDetailToggle() {
      if (!detailItem) return;
      const isCollected = collected.has(detailItem.id);
      $detailToggle.textContent = isCollected
        ? SpritedexI18n.t("detailMarkMissing")
        : SpritedexI18n.t("detailMarkCollected");
    }

    function openDetail(item) {
      detailItem = item;
      const spriteLabel = displaySprite(item);
      const materialLabel = displayMaterial(item);
      $detailTitle.textContent = spriteLabel;
      $detailSubtitle.textContent = materialLabel;
      $detailImg.src = item.image;
      $detailImg.onerror = function onDetailImgErr() {
        this.onerror = null;
        if (item.fallbackImage) this.src = assetUrl(item.fallbackImage);
      };

      const rarity = item.rarity;
      if (rarity) {
        $detailRarity.hidden = false;
        $detailRarity.dataset.rarity = rarity;
        $detailRarity.textContent = SpritedexI18n.rarityLabel(rarity);
      } else {
        $detailRarity.hidden = true;
      }

      $detailMeta.innerHTML = "";
      addDetailRow(SpritedexI18n.t("detailAbility"), localizedField(item.ability));
      const bonus = localizedField(item.variantBonus);
      if (bonus && item.materialId !== "base") {
        addDetailRow(SpritedexI18n.t("detailVariantBonus"), bonus);
      }
      addDetailRow(SpritedexI18n.t("detailHowToFind"), localizedField(item.spawnHint));
      addDetailRow(SpritedexI18n.t("detailSummonCost"), formatDust(item.summonCost));
      if (item.materialId === "base") {
        addDetailRow(SpritedexI18n.t("detailDropRate"), formatDropRate(item.dropRate));
      }
      addDetailRow(SpritedexI18n.t("detailMastery"), SpritedexI18n.t("masteryHint"));

      updateDetailToggle();
      updateDetailMastery();
      $detailOverlay.hidden = false;
      $detailOverlay.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeDetail() {
      detailItem = null;
      $detailOverlay.hidden = true;
      $detailOverlay.classList.add("hidden");
      document.body.style.overflow = "";
    }

    function renderCard(item) {
      const isCollected = collected.has(item.id);
      const isMastered = mastered.has(item.id);
      const compareState = compareMode ? getCompareState(item) : null;
      const inCompareA = compareMode && getCompareSetA().has(item.id);
      const inCompareB = compareMode && getCompareSetB().has(item.id);
      const spriteLabel = displaySprite(item);
      const materialLabel = displayMaterial(item);
      const card = document.createElement("button");
      card.type = "button";
      card.className = `sprite-card${isCollected ? " collected" : ""}${isMastered ? " mastered" : ""}${readOnly ? " readonly" : ""}${compareState ? ` compare-${compareState}` : ""}`;
      card.dataset.spriteId = item.id;
      applyMaterialTheme(card, item.materialId);
      card.setAttribute("aria-pressed", isCollected ? "true" : "false");
      card.setAttribute(
        "aria-label",
        `${spriteLabel}, ${materialLabel}${isCollected ? `, ${SpritedexI18n.t("collectedAria")}` : ""}${isMastered ? `, ${SpritedexI18n.t("masteredAria")}` : ""}`
      );

      card.innerHTML = `
        <button type="button" class="info-btn" aria-label="${SpritedexI18n.t("detailInfo")}">i</button>
        ${compareMode ? `<span class="compare-markers" aria-hidden="true"><span class="compare-dot${inCompareA ? " on-a" : ""}">A</span><span class="compare-dot${inCompareB ? " on-b" : ""}">B</span></span>` : ""}
        <span class="check-badge" aria-hidden="true">✓</span>
        <button type="button" class="mastery-badge${isMastered ? " active" : ""}${isCollected ? "" : " locked"}" aria-label="${SpritedexI18n.t("masteryAria")}" aria-pressed="${isMastered ? "true" : "false"}"${isCollected ? "" : " disabled"}>★</button>
        <div class="sprite-img-wrap">
          <img class="sprite-img" src="${item.image}" alt="" loading="lazy" decoding="async" />
        </div>
        <div class="sprite-label">
          <strong>${materialLabel}</strong>
        </div>
      `;

      card.querySelector(".info-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        openDetail(item);
      });

      card.querySelector(".mastery-badge").addEventListener("click", (e) => {
        e.stopPropagation();
        if (readOnly) {
          showSavePrompt();
          return;
        }
        if (!collected.has(item.id) && !mastered.has(item.id)) return;
        toggleMastered(item.id);
      });

      card.querySelector("img").addEventListener("error", function onErr() {
        this.removeEventListener("error", onErr);
        const src = assetPath(this.src);
        if (item.fallbackImage && src !== assetPath(item.fallbackImage)) {
          this.src = assetUrl(item.fallbackImage);
          return;
        }
        if (src.includes("sprites_named/")) {
          this.src = assetUrl(src.replace("sprites_named/", "sprites/"));
        }
      });

      card.addEventListener("click", () => toggleSprite(item.id));
      return card;
    }

    function render() {
      const grouped = groupCatalog(catalog);
      const frag = document.createDocumentFragment();
      let visibleCount = 0;

      for (const [spriteId, sprites] of grouped) {
        const visible = sprites.filter((s) =>
          matchesSearch(s) && matchesFilter(s) && matchesRarity(s) && matchesMaterial(s)
        );
        if (!visible.length) continue;
        visibleCount += visible.length;

        const masteredInGroup = sprites.filter((s) => mastered.has(s.id)).length;
        const allMastered = masteredInGroup === sprites.length;
        const section = document.createElement("section");
        section.className = `character-section${allMastered ? " all-mastered" : ""}`;
        section.id = `sprite-${spriteId}`;

        const doneInGroup = sprites.filter((s) => collected.has(s.id)).length;
        const header = document.createElement("div");
        header.className = "character-header";

        const titleWrap = document.createElement("div");
        titleWrap.className = "character-title-wrap";

        const h2 = document.createElement("h2");
        h2.append(document.createTextNode(displaySprite({ spriteId }) + " "));
        const rarity = rarityForSprite(spriteId);
        if (rarity) {
          const pill = document.createElement("span");
          pill.className = "rarity-pill";
          pill.dataset.rarity = rarity;
          pill.textContent = SpritedexI18n.rarityLabel(rarity);
          h2.appendChild(pill);
        }
        titleWrap.appendChild(h2);

        const abilityText = SpritedexI18n.spriteAbility(spriteId);
        if (abilityText) {
          const abilityEl = document.createElement("p");
          abilityEl.className = "character-ability";
          abilityEl.textContent = abilityText;
          titleWrap.appendChild(abilityEl);
        }

        const side = document.createElement("div");
        side.className = "character-header-side";

        const stats = document.createElement("span");
        stats.className = `character-stats${doneInGroup === sprites.length ? " done" : ""}`;
        stats.textContent = `${doneInGroup}/${sprites.length}`;

        const masteryStats = document.createElement("span");
        masteryStats.className = `character-stats mastery-stats${allMastered ? " done" : ""}`;
        masteryStats.textContent = `★ ${masteredInGroup}/${sprites.length}`;

        side.append(stats, masteryStats);
        header.append(titleWrap, side);

        const grid = document.createElement("div");
        grid.className = "grid";
        for (const item of visible) {
          grid.appendChild(renderCard(item));
        }

        section.append(header, grid);
        frag.appendChild(section);
      }

      $app.innerHTML = "";
      $app.appendChild(renderRarestPanel());
      if (!visibleCount) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = SpritedexI18n.t("noResults");
        $app.appendChild(empty);
      } else {
        $app.appendChild(frag);
      }

      lastGrouped = grouped;
      updateSpriteRail(grouped);
      updateHeaderOffset();
      updateProgress();
      if (compareMode) updateCompareBanner();
    }

    async function init() {
      try {
        const [configRes, hdRes] = await Promise.all([
          fetch(CONFIG_URL, { cache: "no-store" }),
          fetch(HD_MAP_URL, { cache: "no-store" }).catch(() => null),
        ]);
        if (!configRes.ok) throw new Error(SpritedexI18n.t("loadError"));
        config = await configRes.json();
        if (hdRes?.ok) hdMap = await hdRes.json();
        SpritedexI18n.init(config);
        SpritedexI18n.createLanguageSwitcher(document.getElementById("lang-slot"));
        applyStaticI18n();
        catalog = buildCatalog(config);
        buildMaterialFilters();
        const shared = parseShareFromUrl(catalog);
        if (shared) {
          collected = shared;
          readOnly = true;
        } else {
          collected = loadCollected();
          mastered = loadMastered();
          pruneMastered();
          readOnly = false;
        }
        $btnShare.hidden = false;
        $btnExportPng.hidden = false;
        $btnCompare.hidden = false;
        $btnGuide.hidden = false;
        updateSharedBanner();
        updateCompareBanner();
        render();
      } catch (err) {
        $app.innerHTML = `<div class="error-box">${err.message}</div>`;
      }
    }

    document.getElementById("filters").addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip || !chip.dataset.filter) return;
      filter = chip.dataset.filter;
      syncFilterChips();
      render();
    });

    $filtersMaterial?.addEventListener("click", (e) => {
      const chip = e.target.closest(".mat-pad");
      if (!chip || !chip.dataset.materialFilter) return;
      materialFilter = chip.dataset.materialFilter;
      syncFilterChips();
      render();
    });

    document.getElementById("filters-rarity").addEventListener("click", (e) => {
      const chip = e.target.closest(".rarity-pad");
      if (!chip || !chip.dataset.rarityFilter) return;
      rarityFilter = chip.dataset.rarityFilter;
      syncFilterChips();
      render();
    });

    $search.addEventListener("input", (e) => {
      searchQuery = e.target.value.trim();
      render();
    });

    $btnShare.addEventListener("click", () => shareCollection());
    $btnExportPng.addEventListener("click", () => exportCollectionPng());
    $btnCompare.addEventListener("click", () => openCompareModal());
    $btnGuide.addEventListener("click", () => openGuide());
    document.getElementById("guide-close").addEventListener("click", () => closeGuide());
    $guideOverlay.addEventListener("click", (e) => {
      if (e.target === $guideOverlay) closeGuide();
    });
    document.getElementById("btn-compare-exit").addEventListener("click", () => exitCompareMode());
    document.getElementById("compare-cancel").addEventListener("click", () => closeCompareModal());
    document.getElementById("compare-run").addEventListener("click", () => startCompareMode());
    $compareUseMine.addEventListener("change", () => syncCompareUseMineInput());
    $compareOverlay.addEventListener("click", (e) => {
      if (e.target === $compareOverlay) closeCompareModal();
    });
    document.getElementById("filters-compare").addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip || !chip.dataset.compareFilter) return;
      compareFilter = chip.dataset.compareFilter;
      document.querySelectorAll("#filters-compare .chip").forEach((c) => {
        c.classList.toggle("active", c.dataset.compareFilter === compareFilter);
      });
      render();
    });
    document.getElementById("btn-adopt").addEventListener("click", () => adoptSharedCollection());
    $savePrompt.addEventListener("click", (e) => {
      if (e.target === $savePrompt) hideSavePrompt();
    });

    $detailClose.addEventListener("click", () => closeDetail());
    $detailOverlay.addEventListener("click", (e) => {
      if (e.target === $detailOverlay) closeDetail();
    });
    $detailSheet.addEventListener("click", (e) => e.stopPropagation());
    $detailToggle.addEventListener("click", () => {
      if (!detailItem) return;
      if (readOnly) {
        showSavePrompt();
        return;
      }
      toggleSprite(detailItem.id);
      updateDetailToggle();
      updateDetailMastery();
      const card = document.querySelector(`[data-sprite-id="${detailItem.id}"]`);
      if (card) {
        card.classList.toggle("collected", collected.has(detailItem.id));
        card.setAttribute("aria-pressed", collected.has(detailItem.id) ? "true" : "false");
      }
    });

    $detailMastery.addEventListener("click", () => {
      if (!detailItem) return;
      if (readOnly) {
        showSavePrompt();
        return;
      }
      const item = detailItem;
      toggleMastered(item.id);
      if (!$detailOverlay.hidden) openDetail(item);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (!$guideOverlay.hidden) closeGuide();
        else if (!$compareOverlay.hidden) closeCompareModal();
        else if (!$detailOverlay.hidden) closeDetail();
      }
    });

    window.addEventListener("spritedex:localechange", () => {
      if (detailItem) openDetail(detailItem);
      if (!$guideOverlay.hidden) renderGuideContent();
      buildMaterialFilters();
      applyStaticI18n();
      updateProgress();
      updateCompareBanner();
      render();
    });

    window.addEventListener("resize", () => {
      updateHeaderOffset();
      if (lastGrouped.length) updateSpriteRail(lastGrouped);
    }, { passive: true });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(() => {});
      });
    }

    init();
  </script>
</body>
</html>
