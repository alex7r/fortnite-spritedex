<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortnite Sprites Pocket Tracker — Sprite Labeler</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #343a4a;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #6c8cff;
      --accent-hover: #8aa4ff;
      --success: #4ade80;
      --danger: #f87171;
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
    }

    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    header h1 { margin: 0 0 4px; font-size: 1.15rem; font-weight: 600; }
    header p { margin: 0; color: var(--muted); font-size: 0.85rem; }

    .lang-switch { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2px; }
    .lang-switch button { border: none; background: transparent; color: var(--muted); border-radius: 6px; padding: 5px 10px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
    .lang-switch button.active { background: var(--accent); color: #fff; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    button {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    button:hover { background: #2d3344; border-color: #4a5268; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-hover); }
    button.danger { color: var(--danger); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status { margin-left: auto; font-size: 0.8rem; color: var(--muted); }

    main { padding: 20px; max-width: 1600px; margin: 0 auto; }

    .loading, .error-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .error-box { color: var(--danger); border-color: #7f3a3a; }

    .group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .group-header label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .group-name-input {
      flex: 1;
      min-width: 160px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .group-display-name {
      font-size: 0.85rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .group-count { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card img {
      width: 100%;
      height: 110px;
      object-fit: contain;
      background: repeating-conic-gradient(#1e2230 0% 25%, #181b26 0% 50%) 50% / 16px 16px;
      border-radius: 6px;
    }

    .output-name {
      font-size: 0.72rem;
      color: var(--success);
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .source-name {
      font-size: 0.65rem;
      color: var(--muted);
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .field label {
      display: block;
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .field input, .field select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.82rem;
    }

    .field input:focus, .field select:focus, .group-name-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .export-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 8px;
    }

    .export-panel h2 { margin: 0 0 8px; font-size: 1rem; }
    .export-panel p { margin: 0 0 12px; color: var(--muted); font-size: 0.85rem; }

    #json-output {
      width: 100%;
      min-height: 220px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: #c8d0e0;
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      resize: vertical;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f2937;
      border: 1px solid var(--success);
      color: var(--success);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .status { margin-left: 0; width: 100%; }
    }
  </style>
  <script src="i18n.js"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <h1 id="title">Fortnite Sprites Pocket Tracker — Sprite Labeler</h1>
      <div id="lang-slot"></div>
    </div>
    <p id="hint">Group = sprite name, field = variant. Empty variant → Base.</p>
    <div class="toolbar">
      <button type="button" id="btn-add-group">+ Group</button>
      <button type="button" id="btn-reload">Reload config</button>
      <button type="button" class="primary" id="btn-copy">Copy JSON</button>
      <button type="button" id="btn-download">Download JSON</button>
      <button type="button" id="btn-reset" class="danger">Reset draft</button>
      <span class="status" id="status"></span>
    </div>
  </header>

  <main>
    <div id="app">
      <div class="loading" id="loading">Loading…</div>
    </div>

    <section class="export-panel" id="export-panel" hidden>
      <h2 id="export-title">Export JSON</h2>
      <p id="export-hint">Save as sprites-config.json, then run: python apply_labels.py</p>
      <textarea id="json-output" readonly></textarea>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const CONFIG_URL = "sprites-config.json";
    const STORAGE_KEY = "sprites-tracker-labeler-v3";

    let baseConfig = null;
    let state = null;
    let saveTimer = null;

    const $app = document.getElementById("app");
    const $exportPanel = document.getElementById("export-panel");
    const $jsonOutput = document.getElementById("json-output");
    const $status = document.getElementById("status");
    const $toast = document.getElementById("toast");

    function t(key) {
      return SpritedexI18n.t(key);
    }

    function loadingMessage() {
      return `${t("loading")} ${t("configFile")}…`;
    }

    function applyStaticI18n() {
      document.title = `${t("appTitle")} — ${t("labelerTitle")}`;
      document.getElementById("title").textContent = `${t("appTitle")} — ${t("labelerTitle")}`;
      document.getElementById("hint").textContent = t("labelerHint");
      document.getElementById("btn-add-group").textContent = t("addGroup");
      document.getElementById("btn-reload").textContent = t("reloadConfig");
      document.getElementById("btn-copy").textContent = t("copyJson");
      document.getElementById("btn-download").textContent = t("downloadJson");
      document.getElementById("btn-reset").textContent = t("resetDraft");
      document.getElementById("export-title").textContent = t("exportPanelTitle");
      document.getElementById("export-hint").textContent = t("exportPanelHint");
      const $loading = document.getElementById("loading");
      if ($loading) $loading.textContent = loadingMessage();
    }

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add("show");
      setTimeout(() => $toast.classList.remove("show"), 2000);
    }

    function sanitize(part) {
      part = (part || "").trim();
      part = part.replace(/[<>:"/\\|?*\x00]/g, "_");
      return part || "unnamed";
    }

    function englishSpriteLabel(spriteId) {
      return baseConfig?.i18n?.sprites?.[spriteId]?.en || spriteId;
    }

    function englishMaterialLabel(materialId) {
      return baseConfig?.i18n?.materials?.[materialId]?.en || materialId;
    }

    function computeOutputName(spriteId, materialId) {
      const sep = state?.nameSeparator || "_";
      const sprite = sanitize(englishSpriteLabel(spriteId).replace(/\s+/g, ""));
      const material = sanitize(englishMaterialLabel(materialId || "base").replace(/\s+/g, ""));
      return `${sprite}${sep}${material}.png`;
    }

    function spriteMaterialId(sprite) {
      return sprite.materialId || state?.defaultMaterial || "base";
    }

    function spriteImageUrl(sprite) {
      const outputDir = state?.outputDir || "sprites_named";
      if (sprite.output) return `${outputDir}/${sprite.output}`;
      const group = state.groups.find((g) => g.sprites.includes(sprite));
      const spriteId = group?.spriteId?.trim() || "unnamed";
      return `${outputDir}/${computeOutputName(spriteId, spriteMaterialId(sprite))}`;
    }

    function resolveMaterialId(value) {
      if (baseConfig) return SpritedexI18n.materialIdFromInput(value);
      const raw = (value || "").trim().toLowerCase();
      return raw || "base";
    }

    function cloneGroupsFromConfig(config) {
      return config.groups.map((g) => ({
        id: g.id,
        spriteId: g.spriteId || g.name || "",
        sprites: g.sprites.map((s) => ({
          id: s.id || s.source?.replace(/\.png$/i, "") || s.file?.replace(/\.png$/i, ""),
          source: s.source || s.file,
          output: s.output || "",
          materialId: s.materialId || resolveMaterialId(s.type || ""),
        })),
      }));
    }

    function stateFromConfig(config) {
      return {
        version: config.version || 3,
        sourceDir: config.sourceDir || "sprites",
        outputDir: config.outputDir || "sprites_named",
        defaultMaterial: config.defaultMaterial || "base",
        nameSeparator: config.nameSeparator || "_",
        groups: cloneGroupsFromConfig(config),
      };
    }

    async function loadConfigFromFile() {
      const res = await fetch(CONFIG_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`${t("loadError")} (${res.status})`);
      return res.json();
    }

    function loadDraftOrConfig(config) {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const draft = JSON.parse(saved);
          if (draft?.groups?.length) return draft;
        } catch (_) {}
      }
      return stateFromConfig(config);
    }

    function saveState() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateStatus();
      }, 200);
    }

    function newGroupId() {
      return "group-" + Date.now().toString(36);
    }

    function totalSprites() {
      return state.groups.reduce((n, g) => n + g.sprites.length, 0);
    }

    function materialCount() {
      let n = 0;
      for (const g of state.groups) {
        for (const s of g.sprites) {
          const mid = spriteMaterialId(s);
          if (mid && mid !== "base") n++;
        }
      }
      return n;
    }

    function groupLabel(group) {
      return group.spriteId?.trim()
        ? SpritedexI18n.spriteName(group.spriteId)
        : t("unnamedGroup");
    }

    function buildExport() {
      return {
        version: 3,
        exportedAt: new Date().toISOString(),
        sourceDir: state.sourceDir,
        outputDir: state.outputDir,
        defaultMaterial: state.defaultMaterial,
        nameSeparator: state.nameSeparator,
        defaultLocale: baseConfig?.defaultLocale || "en",
        materialAliases: baseConfig?.materialAliases || {},
        typeSuggestions: baseConfig?.typeSuggestions || [],
        i18n: baseConfig?.i18n || {},
        groups: state.groups.map((g) => ({
          id: g.id,
          spriteId: g.spriteId.trim(),
          sprites: g.sprites.map((s) => {
            const materialId = spriteMaterialId(s);
            const spriteId = g.spriteId.trim() || "unnamed";
            return {
              id: s.id,
              source: s.source,
              materialId,
              output: computeOutputName(spriteId, materialId),
            };
          }),
        })),
      };
    }

    function updateJson() {
      $jsonOutput.value = JSON.stringify(buildExport(), null, 2);
    }

    function updateStatus() {
      const namedGroups = state.groups.filter((g) => g.spriteId?.trim()).length;
      $status.textContent =
        `${state.groups.length} (${namedGroups} ${t("groupsNamed")}) · ` +
        `${totalSprites()} ${t("sprites")} · ` +
        `${materialCount()}/${totalSprites()} ${t("materialsCount")}`;
      updateJson();
      refreshOutputLabels();
    }

    function refreshOutputLabels() {
      document.querySelectorAll(".card").forEach((card) => {
        const spriteId = card.dataset.spriteId;
        const groupId = card.dataset.groupId;
        const group = state.groups.find((g) => g.id === groupId);
        const sprite = group?.sprites.find((s) => s.id === spriteId);
        if (!sprite || !group) return;
        const out = card.querySelector(".output-name");
        if (out) {
          out.textContent = computeOutputName(
            group.spriteId?.trim() || "unnamed",
            spriteMaterialId(sprite)
          );
        }
        const matInput = card.querySelector(".material-input");
        if (matInput && document.activeElement !== matInput) {
          matInput.value = SpritedexI18n.materialInputValue(spriteMaterialId(sprite));
        }
      });
      document.querySelectorAll(".group").forEach((section) => {
        const group = state.groups.find((g) => g.id === section.dataset.groupId);
        if (!group) return;
        const display = section.querySelector(".group-display-name");
        if (display) {
          display.textContent = group.spriteId?.trim()
            ? SpritedexI18n.spriteName(group.spriteId)
            : "";
        }
      });
      document.querySelectorAll(".group-select").forEach((select) => {
        const currentGroupId = select.closest(".card")?.dataset.groupId;
        const selected = select.value;
        select.innerHTML = "";
        for (const g of state.groups) {
          const opt = document.createElement("option");
          opt.value = g.id;
          opt.textContent = groupLabel(g);
          if (g.id === selected) opt.selected = true;
          select.appendChild(opt);
        }
      });
    }

    function moveSprite(spriteId, targetGroupId) {
      let sprite = null;
      let sourceGroup = null;

      for (const g of state.groups) {
        const idx = g.sprites.findIndex((s) => s.id === spriteId);
        if (idx !== -1) {
          sprite = g.sprites.splice(idx, 1)[0];
          sourceGroup = g;
          break;
        }
      }
      if (!sprite) return;

      const target = state.groups.find((g) => g.id === targetGroupId);
      if (!target || target === sourceGroup) {
        sourceGroup.sprites.push(sprite);
        return;
      }
      target.sprites.push(sprite);
      render();
      saveState();
    }

    function renderCard(sprite, group) {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.spriteId = sprite.id;
      card.dataset.groupId = group.id;

      const img = document.createElement("img");
      img.src = spriteImageUrl(sprite);
      img.alt = sprite.source;
      img.loading = "lazy";
      img.addEventListener("error", () => {
        img.src = `${state.sourceDir}/${sprite.source}`;
      });

      const outputName = document.createElement("div");
      outputName.className = "output-name";
      outputName.textContent = computeOutputName(
        group.spriteId?.trim() || "unnamed",
        spriteMaterialId(sprite)
      );

      const sourceName = document.createElement("div");
      sourceName.className = "source-name";
      sourceName.textContent = sprite.source;

      const typeField = document.createElement("div");
      typeField.className = "field";
      const typeLabel = document.createElement("label");
      typeLabel.textContent = t("materialLabel");
      const typeInput = document.createElement("input");
      typeInput.type = "text";
      typeInput.className = "material-input";
      typeInput.placeholder = SpritedexI18n.materialName("base");
      typeInput.value = SpritedexI18n.materialInputValue(spriteMaterialId(sprite));
      typeInput.setAttribute("list", "type-suggestions");
      typeInput.addEventListener("input", () => {
        sprite.materialId = SpritedexI18n.materialIdFromInput(typeInput.value);
        outputName.textContent = computeOutputName(
          group.spriteId?.trim() || "unnamed",
          spriteMaterialId(sprite)
        );
        saveState();
      });
      typeField.append(typeLabel, typeInput);

      const groupField = document.createElement("div");
      groupField.className = "field";
      const groupLabelEl = document.createElement("label");
      groupLabelEl.textContent = t("groupField");
      const groupSelect = document.createElement("select");
      groupSelect.className = "group-select";
      for (const g of state.groups) {
        const opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = groupLabel(g);
        if (g.id === group.id) opt.selected = true;
        groupSelect.appendChild(opt);
      }
      groupSelect.addEventListener("change", () => moveSprite(sprite.id, groupSelect.value));
      groupField.append(groupLabelEl, groupSelect);

      card.append(img, outputName, sourceName, typeField, groupField);
      return card;
    }

    function render() {
      const $groups = document.createElement("div");
      $groups.id = "groups";

      for (const group of state.groups) {
        const section = document.createElement("section");
        section.className = "group";
        section.dataset.groupId = group.id;

        const header = document.createElement("div");
        header.className = "group-header";

        const label = document.createElement("label");
        label.textContent = t("groupLabel");

        const nameInput = document.createElement("input");
        nameInput.className = "group-name-input";
        nameInput.type = "text";
        nameInput.placeholder = "water";
        nameInput.value = group.spriteId || "";
        nameInput.setAttribute("list", "sprite-suggestions");
        nameInput.addEventListener("input", () => {
          group.spriteId = nameInput.value;
          const display = header.querySelector(".group-display-name");
          if (display) {
            display.textContent = group.spriteId.trim()
              ? SpritedexI18n.spriteName(group.spriteId)
              : "";
          }
          saveState();
          refreshOutputLabels();
        });

        const displayName = document.createElement("span");
        displayName.className = "group-display-name";
        displayName.textContent = group.spriteId?.trim()
          ? SpritedexI18n.spriteName(group.spriteId)
          : "";

        const count = document.createElement("span");
        count.className = "group-count";
        count.textContent = `${group.sprites.length} ${t("sprites")}`;

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "danger";
        deleteBtn.textContent = t("deleteGroup");
        deleteBtn.title = t("deleteGroupTitle");
        deleteBtn.addEventListener("click", () => {
          if (state.groups.length <= 1) return;
          const target = state.groups.find((g) => g.id !== group.id);
          target.sprites.push(...group.sprites);
          state.groups = state.groups.filter((g) => g.id !== group.id);
          render();
          saveState();
        });

        header.append(label, nameInput, displayName, count, deleteBtn);

        const grid = document.createElement("div");
        grid.className = "grid";
        for (const sprite of group.sprites) {
          grid.appendChild(renderCard(sprite, group));
        }

        section.append(header, grid);
        $groups.appendChild(section);
      }

      $app.innerHTML = "";
      $app.appendChild($groups);
      $exportPanel.hidden = false;
      updateStatus();
    }

    function setupSuggestions() {
      let matDl = document.getElementById("type-suggestions");
      if (!matDl) {
        matDl = document.createElement("datalist");
        matDl.id = "type-suggestions";
        document.body.appendChild(matDl);
      }
      matDl.innerHTML = "";
      SpritedexI18n.materialSuggestions().forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name;
        matDl.appendChild(opt);
      });

      let spriteDl = document.getElementById("sprite-suggestions");
      if (!spriteDl) {
        spriteDl = document.createElement("datalist");
        spriteDl.id = "sprite-suggestions";
        document.body.appendChild(spriteDl);
      }
      spriteDl.innerHTML = "";
      const spriteIds = Object.keys(baseConfig?.i18n?.sprites || {});
      spriteIds.forEach((id) => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.label = SpritedexI18n.spriteName(id);
        spriteDl.appendChild(opt);
      });
    }

    async function init(fromFileOnly = false) {
      $app.innerHTML = `<div class="loading" id="loading">${loadingMessage()}</div>`;
      try {
        baseConfig = await loadConfigFromFile();
        SpritedexI18n.init(baseConfig);
        const $langSlot = document.getElementById("lang-slot");
        if (!$langSlot.childElementCount) {
          SpritedexI18n.createLanguageSwitcher($langSlot);
        }
        applyStaticI18n();
        if (fromFileOnly) {
          localStorage.removeItem(STORAGE_KEY);
          state = stateFromConfig(baseConfig);
        } else {
          state = loadDraftOrConfig(baseConfig);
        }
        setupSuggestions();
        render();
        showToast(fromFileOnly ? t("reloadDone") : t("ready"));
      } catch (err) {
        $app.innerHTML =
          `<div class="error-box">${err.message}<br><br>${t("loadHint")}<br><code>python3 -m http.server 8765</code></div>`;
        $exportPanel.hidden = true;
      }
    }

    document.getElementById("btn-add-group").addEventListener("click", () => {
      state.groups.push({ id: newGroupId(), spriteId: "", sprites: [] });
      render();
      saveState();
    });

    document.getElementById("btn-reload").addEventListener("click", () => {
      if (!confirm(t("reloadConfirm"))) return;
      init(true);
    });

    document.getElementById("btn-copy").addEventListener("click", async () => {
      const text = $jsonOutput.value;
      try {
        await navigator.clipboard.writeText(text);
        showToast(t("copyDone"));
      } catch (_) {
        $jsonOutput.select();
        document.execCommand("copy");
        showToast(t("copyDone"));
      }
    });

    document.getElementById("btn-download").addEventListener("click", () => {
      const blob = new Blob([$jsonOutput.value], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = t("configFile");
      a.click();
      URL.revokeObjectURL(a.href);
      showToast(t("downloadDone"));
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      if (!confirm(t("reloadConfirm"))) return;
      init(true);
    });

    window.addEventListener("spritedex:localechange", () => {
      applyStaticI18n();
      if (state) {
        setupSuggestions();
        render();
      }
    });

    init(false);
  </script>
</body>
</html>
